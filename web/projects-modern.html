<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Projects - llmXive</title>
    
    <!-- Modern, vibrant theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Modern, vibrant color palette */
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --primary-bg: #eef2ff;
            
            --secondary: #06b6d4;
            --secondary-dark: #0891b2;
            --secondary-light: #67e8f9;
            
            --accent: #f59e0b;
            --accent-dark: #d97706;
            --accent-light: #fde68a;
            
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            
            --background: #ffffff;
            --surface: var(--gray-50);
            --surface-elevated: #ffffff;
            --border: var(--gray-200);
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --text-tertiary: var(--gray-400);
            
            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
            
            /* Spacing and sizing */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 1rem 0;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            opacity: 0.9;
        }

        .nav-link:hover,
        .nav-link.active {
            opacity: 1;
            transform: translateY(-1px);
        }

        .login-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Main content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* Page header */
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
        }

        /* Filters */
        .filters-section {
            background: var(--surface-elevated);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 3rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-select {
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--background);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: var(--transition);
            font-family: var(--font-family);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-box {
            grid-column: 1 / -1;
        }

        .search-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--background);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
            font-family: var(--font-family);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        /* Results header */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem 0;
            border-bottom: 2px solid var(--border);
        }

        .results-count {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .sort-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .sort-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .sort-select {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--background);
            color: var(--text-primary);
            font-size: 0.875rem;
            font-family: var(--font-family);
            transition: var(--transition);
        }

        .sort-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Projects grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--surface-elevated);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-light);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: var(--transition);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-content {
            padding: 1.5rem;
        }

        .project-header {
            margin-bottom: 1rem;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .project-field {
            display: inline-block;
            background: var(--primary-bg);
            color: var(--primary-dark);
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-sm);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .project-description {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-meta {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .project-dates {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .project-status {
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-backlog {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .status-design {
            background: #fef3c7;
            color: #92400e;
        }

        .status-planning {
            background: var(--primary-bg);
            color: var(--primary-dark);
        }

        .completeness-section {
            margin-bottom: 1rem;
        }

        .completeness-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .completeness-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .completeness-value {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .completeness-bar {
            height: 6px;
            background: var(--gray-200);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .completeness-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success) 0%, var(--secondary) 100%);
            transition: width 0.3s ease;
            border-radius: var(--radius-sm);
        }

        .contributors {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .contributor-tag {
            background: var(--surface);
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        /* Empty state */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        /* Loading state */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .header-content {
                padding: 0 1rem;
            }

            .nav-links {
                gap: 1rem;
            }

            .main-content {
                padding: 2rem 1rem;
            }

            .page-title {
                font-size: 2.5rem;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .results-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .sort-controls {
                justify-content: space-between;
            }
        }

        /* Modal styles - same as dashboard */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--surface-elevated);
            border-radius: var(--radius-xl);
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            margin: 2rem;
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-xl);
        }

        .modal.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-right: 1rem;
            line-height: 1.3;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--gray-100);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-field {
            margin-bottom: 1.5rem;
        }

        .modal-field-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .modal-field-value {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .document-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .document-link {
            display: block;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .document-link:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .document-link-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .document-link-type {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid;
            border-radius: var(--radius-md);
            text-decoration: none;
            text-align: center;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            background: none;
            font-size: 0.875rem;
        }

        .btn-primary {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: white;
        }

        .btn-success {
            border-color: var(--success);
            color: var(--success);
        }

        .btn-success:hover {
            background: var(--success);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="dashboard-modern.html" class="logo">llmXive</a>
            <nav class="nav-links">
                <a href="dashboard-modern.html" class="nav-link">Dashboard</a>
                <a href="projects-modern.html" class="nav-link active">Browse Projects</a>
                <a href="#" class="nav-link" onclick="submitIdea()">Submit Idea</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="#" class="login-btn" onclick="handleGitHubLogin()" id="github-login-btn">Log in with GitHub</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Header -->
        <section class="page-header">
            <h1 class="page-title">Browse Projects</h1>
            <p class="page-subtitle">
                Explore our complete collection of research projects
            </p>
        </section>

        <!-- Filters -->
        <section class="filters-section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label" for="field-filter">Research Field</label>
                    <select class="filter-select" id="field-filter">
                        <option value="">All Fields</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label" for="status-filter">Status</label>
                    <select class="filter-select" id="status-filter">
                        <option value="">All Statuses</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label" for="completeness-filter">Progress</label>
                    <select class="filter-select" id="completeness-filter">
                        <option value="">All Levels</option>
                        <option value="90-100">Excellent (90-100%)</option>
                        <option value="80-89">Good (80-89%)</option>
                        <option value="60-79">Fair (60-79%)</option>
                        <option value="40-59">Developing (40-59%)</option>
                        <option value="0-39">Needs Work (0-39%)</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label" for="contributor-filter">Contributors</label>
                    <select class="filter-select" id="contributor-filter">
                        <option value="">All Contributors</option>
                    </select>
                </div>
                
                <div class="search-box">
                    <input type="text" class="search-input" id="search-input" placeholder="Search projects by title, description, keywords, or contributors...">
                </div>
            </div>
        </section>

        <!-- Results -->
        <div class="results-header">
            <div class="results-count" id="results-count">Loading projects...</div>
            <div class="sort-controls">
                <span class="sort-label">Sort by:</span>
                <select class="sort-select" id="sort-select">
                    <option value="modified-desc">Recently Modified</option>
                    <option value="created-desc">Recently Created</option>
                    <option value="title-asc">Title A-Z</option>
                    <option value="completeness-desc">Progress</option>
                    <option value="field-asc">Field</option>
                    <option value="upvotes-desc">Most Upvoted</option>
                    <option value="total-votes-desc">Most Voted</option>
                </select>
            </div>
        </div>

        <div id="projects-content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading projects...</p>
            </div>
        </div>
    </main>

    <!-- Project Modal -->
    <div id="project-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Project Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Project details will be populated here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="src/data/ProjectDataManager.js"></script>
    <script src="src/components/DocumentViewer.js"></script>
    <script src="src/components/ReviewSystem.js"></script>
    
    <script>
        class ModernProjectsPage {
            constructor() {
                this.dataManager = window.ProjectDataManager;
                this.allProjects = [];
                this.filteredProjects = [];
                this.init();
            }

            async init() {
                try {
                    const loaded = await this.dataManager.loadData();
                    if (!loaded) {
                        throw new Error('Failed to load project data');
                    }
                    
                    this.allProjects = Object.values(this.dataManager.getAllProjects());
                    this.filteredProjects = [...this.allProjects];
                    
                    this.setupFilters();
                    this.setupEventListeners();
                    this.renderProjects();
                    this.updateResultsCount();
                    
                } catch (error) {
                    this.showError(error.message);
                }
            }

            setupFilters() {
                const analytics = this.dataManager.getAnalytics();
                
                // Populate field filter
                const fieldFilter = document.getElementById('field-filter');
                Object.keys(analytics.projectsByField).sort().forEach(field => {
                    const option = document.createElement('option');
                    option.value = field;
                    option.textContent = field;
                    fieldFilter.appendChild(option);
                });
                
                // Populate status filter
                const statusFilter = document.getElementById('status-filter');
                Object.keys(analytics.projectsByStatus).sort().forEach(status => {
                    const option = document.createElement('option');
                    option.value = status;
                    option.textContent = status.charAt(0).toUpperCase() + status.slice(1);
                    statusFilter.appendChild(option);
                });
                
                // Populate contributor filter - fix Gemini duplication
                const contributorFilter = document.getElementById('contributor-filter');
                const contributors = new Set();
                this.allProjects.forEach(project => {
                    project.contributors.forEach(c => {
                        // Normalize "Google Gemini" to just "Gemini"
                        const name = c.name === 'Google Gemini' ? 'Gemini' : c.name;
                        contributors.add(name);
                    });
                });
                Array.from(contributors).sort().forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    contributorFilter.appendChild(option);
                });
            }

            setupEventListeners() {
                // Filter and search event listeners
                ['field-filter', 'status-filter', 'completeness-filter', 'contributor-filter'].forEach(id => {
                    document.getElementById(id).addEventListener('change', () => this.applyFilters());
                });
                
                document.getElementById('search-input').addEventListener('input', () => this.applyFilters());
                document.getElementById('sort-select').addEventListener('change', () => this.sortAndRender());
            }

            applyFilters() {
                const fieldFilter = document.getElementById('field-filter').value;
                const statusFilter = document.getElementById('status-filter').value;
                const completenessFilter = document.getElementById('completeness-filter').value;
                const contributorFilter = document.getElementById('contributor-filter').value;
                const searchQuery = document.getElementById('search-input').value.toLowerCase();
                
                this.filteredProjects = this.allProjects.filter(project => {
                    // Field filter
                    if (fieldFilter && !project.field.includes(fieldFilter)) {
                        return false;
                    }
                    
                    // Status filter
                    if (statusFilter && project.status !== statusFilter) {
                        return false;
                    }
                    
                    // Completeness filter
                    if (completenessFilter) {
                        const [min, max] = completenessFilter.split('-').map(Number);
                        if (project.completeness < min || project.completeness > max) {
                            return false;
                        }
                    }
                    
                    // Contributor filter - handle Gemini normalization
                    if (contributorFilter) {
                        const hasContributor = project.contributors.some(c => {
                            const name = c.name === 'Google Gemini' ? 'Gemini' : c.name;
                            return name === contributorFilter;
                        });
                        if (!hasContributor) {
                            return false;
                        }
                    }
                    
                    // Search filter
                    if (searchQuery) {
                        const searchable = [
                            project.title,
                            project.description,
                            project.field,
                            ...project.keywords,
                            ...project.contributors.map(c => c.name === 'Google Gemini' ? 'Gemini' : c.name)
                        ].join(' ').toLowerCase();
                        
                        if (!searchable.includes(searchQuery)) {
                            return false;
                        }
                    }
                    
                    return true;
                });
                
                this.sortAndRender();
                this.updateResultsCount();
            }

            sortAndRender() {
                const sortBy = document.getElementById('sort-select').value;
                
                this.filteredProjects.sort((a, b) => {
                    switch (sortBy) {
                        case 'modified-desc':
                            return new Date(b.dateModified) - new Date(a.dateModified);
                        case 'created-desc':
                            return new Date(b.dateCreated) - new Date(a.dateCreated);
                        case 'title-asc':
                            return a.title.localeCompare(b.title);
                        case 'completeness-desc':
                            return b.completeness - a.completeness;
                        case 'field-asc':
                            return a.field.localeCompare(b.field);
                        case 'upvotes-desc':
                            const aVotes = window.reviewSystem ? window.reviewSystem.getProjectVotes(a.id) : {upvotes: 0};
                            const bVotes = window.reviewSystem ? window.reviewSystem.getProjectVotes(b.id) : {upvotes: 0};
                            return bVotes.upvotes - aVotes.upvotes;
                        case 'total-votes-desc':
                            const aTotalVotes = window.reviewSystem ? window.reviewSystem.getProjectVotes(a.id) : {upvotes: 0, downvotes: 0};
                            const bTotalVotes = window.reviewSystem ? window.reviewSystem.getProjectVotes(b.id) : {upvotes: 0, downvotes: 0};
                            const aTotalCount = aTotalVotes.upvotes + aTotalVotes.downvotes;
                            const bTotalCount = bTotalVotes.upvotes + bTotalVotes.downvotes;
                            return bTotalCount - aTotalCount;
                        default:
                            return 0;
                    }
                });
                
                this.renderProjects();
            }

            renderProjects() {
                const container = document.getElementById('projects-content');
                
                if (this.filteredProjects.length === 0) {
                    container.innerHTML = `
                        <div class="no-results">
                            <h3>No projects found</h3>
                            <p>Try adjusting your filters or search terms to find what you're looking for.</p>
                        </div>
                    `;
                    return;

                container.innerHTML = `

        function submitNewIdea() {
            const title = document.getElementById('idea-title').value;
            const field = document.getElementById('idea-field').value;
            const description = document.getElementById('idea-description').value;
            const keywords = document.getElementById('idea-keywords').value.split(',').map(k => k.trim()).filter(k => k);
            const timeline = document.getElementById('idea-timeline').value;
            
            // Generate project ID
            const date = new Date().toISOString().split('T')[0];
            const randomNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            const projectId = field.toLowerCase().replace(/[^a-z]/g, '-') + '-' + date.replace(/-/g, '') + '-' + randomNum;
            
            // Create project object
            const newProject = {
                id: projectId,
                title: title,
                description: description,
                field: field,
                status: 'backlog',
                phase: 'idea',
                githubIssue: null,
                dateCreated: new Date().toISOString().split('T')[0],
                dateModified: new Date().toISOString().split('T')[0],
                contributors: [{
                    type: 'human',
                    name: getCurrentUser(),
                    role: 'primary_author',
                    dateContributed: new Date().toISOString().split('T')[0]
                }],
                completeness: 5, // Initial idea submission
                keywords: keywords,
                dependencies: [],
                location: `technical_design_documents/${projectId}/design.md`,
                issues: ['Needs peer review for advancement', 'Requires technical design development'],
                estimatedTimeline: timeline,
                reviews: []
            };
            
            // Add project to local database
            try {
                window.ProjectDataManager.addProject(newProject);
                
                // Show success message
                showSuccessNotification(`Project "${title}" submitted successfully! Your idea is now in the review queue.`);
                closeSubmitModal();
                
                // Refresh the projects list
                setTimeout(() => {
                    location.reload();
                }, 1500);
                
            } catch (error) {
                console.error('Failed to add project:', error);
                showErrorNotification('Failed to submit project. Please try again.');
            }
        }

        function logout() {
            localStorage.removeItem('llmxive-github-user');
            updateLoginUI();
            showSuccessNotification('You have been logged out.');
        }

        function updateLoginUI() {
            const currentUser = localStorage.getItem('llmxive-github-user');
            const loginBtn = document.getElementById('github-login-btn');
            
            if (currentUser) {
                const user = JSON.parse(currentUser);
                loginBtn.innerHTML = `
                    <img src="${user.avatar_url}" alt="${user.name}" style="width: 24px; height: 24px; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle;">
                    ${user.name}
                `;
                loginBtn.style.background = 'rgba(255, 255, 255, 0.1)';
            } else {
                loginBtn.textContent = 'Log in with GitHub';
                loginBtn.style.background = 'rgba(255, 255, 255, 0.2)';
            }
        }

        function closeLoginModal() {
            const modal = document.querySelector('.modal.show');
            if (modal) {
                modal.remove();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            new ModernProjectsPage();
            
            // Update login UI based on current state
            updateLoginUI();
        });
    </script>
</body>
</html>
