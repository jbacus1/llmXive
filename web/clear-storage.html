<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Storage</title>
</head>
<body>
    <h1>Clear Storage</h1>
    <button onclick="clearStorage()">Clear localStorage</button>
    <div id="output"></div>

    <script>
        function clearStorage() {
            localStorage.clear();
            document.getElementById('output').innerHTML = '<p>localStorage cleared!</p>';
            console.log('localStorage cleared');
        }
        
        // Show current localStorage content
        document.getElementById('output').innerHTML = '<pre>' + JSON.stringify(localStorage, null, 2) + '</pre>';
    </script>
</body>
</html>
