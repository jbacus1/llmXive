<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test About Flowchart</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 2rem; }
        .test-btn { 
            background: #6366f1; 
            color: white; 
            padding: 0.5rem 1rem; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 0.5rem;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Test About Flowchart Links</h1>
    
    <button onclick="testFlowchartModal('idea')" class="test-btn">Test Idea Modal</button>
    <button onclick="testFlowchartModal('technical-design')" class="test-btn">Test Design Modal</button>
    <button onclick="testFlowchartModal('review-auto')" class="test-btn">Test Review Auto</button>
    
    <div id="test-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Modal Title</h2>
            <div id="modal-body">Modal Body</div>
            <button onclick="closeTestModal()">Close</button>
        </div>
    </div>

    <script src="src/data/ProjectDataManager.js"></script>
    <script>
        function testFlowchartModal(stage) {
            console.log('Testing modal for stage:', stage);
            
            const modal = document.getElementById('test-modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            title.textContent = `Stage: ${stage}`;
            
            // Test if ProjectDataManager is available
            if (window.ProjectDataManager) {
                body.innerHTML = '<p>ProjectDataManager is available!</p>';
                
                // Try to load projects
                setTimeout(async () => {
                    try {
                        await window.ProjectDataManager.loadData();
                        const projects = window.ProjectDataManager.getAllProjects();
                        body.innerHTML += `<p>Loaded ${Object.keys(projects).length} projects</p>`;
                        
                        // Show some project examples
                        Object.values(projects).slice(0, 3).forEach(project => {
                            body.innerHTML += `<div style="border: 1px solid #ccc; padding: 0.5rem; margin: 0.5rem 0;">
                                <strong>${project.title}</strong><br>
                                ${project.field} - ${project.status}
                            </div>`;
                        });
                        
                    } catch (error) {
                        body.innerHTML += `<p style="color: red;">Error: ${error.message}</p>`;
                    }
                }, 100);
                
            } else {
                body.innerHTML = '<p style="color: red;">ProjectDataManager not available!</p>';
            }
            
            modal.classList.remove('hidden');
        }
        
        function closeTestModal() {
            document.getElementById('test-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
