name: Automated Research Pipeline

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      field:
        description: 'Research field for idea generation'
        required: false
        default: ''
        type: string
      test_mode:
        description: 'Run in test mode (shorter execution)'
        required: false
        default: false
        type: boolean

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

jobs:
  api-test:
    runs-on: ubuntu-latest
    name: Test API Connections
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Test API connections
      run: |
        python scripts/llmxive-cli.py --test-apis
        
  automated-research:
    runs-on: ubuntu-latest
    needs: api-test
    name: Run Automated Research Pipeline
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run research pipeline
      run: |
        if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
          echo "Running in test mode"
          python scripts/llmxive-cli.py --field "${{ github.event.inputs.field }}"
        else
          echo "Running full pipeline"
          python scripts/llmxive-cli.py --field "${{ github.event.inputs.field }}"
        fi
        
    - name: Verify outputs
      run: |
        echo "Checking for generated papers..."
        find papers -name "*.tex" -newer papers 2>/dev/null | head -5 || echo "No new papers found"
        
        echo "Recent pipeline log entries..."
        tail -20 pipeline_log.txt 2>/dev/null || echo "No log file found"
        
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add new/modified files
        git add -A
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🤖 Automated research pipeline results

Generated by GitHub Actions automated pipeline
          
🤖 Generated with llmXive Automation

Co-Authored-By: GitHub Actions <noreply@github.com>"
          
          git push
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: research-outputs
        path: |
          papers/
          technical_design_documents/
          implementation_plans/
          pipeline_log.txt
        retention-days: 30
        
  quality-check:
    runs-on: ubuntu-latest
    needs: automated-research
    name: Quality Assurance Check
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check for quality issues
      run: |
        echo "Scanning for quality issues in generated papers..."
        
        # Check for placeholder/hallucinated content
        if find papers -name "*.tex" -exec grep -l "placeholder\|TODO\|FIXME\|hallucinated" {} \; 2>/dev/null; then
          echo "⚠️ Quality issues detected in papers"
          exit 1
        fi
        
        # Check for proper attribution
        paper_count=$(find papers -name "*.tex" | wc -l)
        echo "Total papers: $paper_count"
        
        if [ $paper_count -gt 0 ]; then
          echo "✅ Papers generated successfully"
          
          # Basic paper validation
          for paper in $(find papers -name "*.tex" | head -3); do
            word_count=$(wc -w < "$paper")
            echo "Paper: $paper - Words: $word_count"
            
            if [ $word_count -lt 1000 ]; then
              echo "⚠️ Paper may be too short: $paper"
            fi
          done
        else
          echo "❌ No papers generated"
          exit 1
        fi
        
    - name: Generate quality report
      run: |
        echo "# Quality Assurance Report" > quality_report.md
        echo "Generated: $(date)" >> quality_report.md
        echo "" >> quality_report.md
        
        echo "## Papers Generated" >> quality_report.md
        find papers -name "*.tex" | while read paper; do
          word_count=$(wc -w < "$paper")
          echo "- $(basename "$paper"): $word_count words" >> quality_report.md
        done
        
        echo "" >> quality_report.md
        echo "## Recent Log Entries" >> quality_report.md
        echo "\`\`\`" >> quality_report.md
        tail -10 pipeline_log.txt 2>/dev/null >> quality_report.md || echo "No log entries" >> quality_report.md
        echo "\`\`\`" >> quality_report.md
        
    - name: Upload quality report
      uses: actions/upload-artifact@v3
      with:
        name: quality-report
        path: quality_report.md