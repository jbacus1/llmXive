# Deploy web/ to GitHub Pages.
#
# Pages is configured to serve from `main:/docs`; this workflow copies
# `web/` into `docs/` on every push to main, then commits and pushes
# the result. Keeps the source tree (`web/`) clean while the published
# site (`docs/`) stays in lock-step.

name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync web/ → docs/
        run: |
          rm -rf docs
          cp -R web docs
          # GitHub Pages convention: empty .nojekyll opts out of Jekyll.
          touch docs/.nojekyll

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "deploy: sync web/ → docs/ for GitHub Pages

[skip ci]"
            git push
          fi
