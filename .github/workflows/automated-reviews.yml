name: Automated Review Generation

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Specific project ID to review (optional)'
        required: false
        type: string
      force_review:
        description: 'Force review even if recently reviewed'
        required: false
        type: boolean
        default: false

jobs:
  generate-reviews:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for queued model tasks
        id: check-tasks
        run: |
          if [ -f ".llmxive-system/queue/model-tasks.json" ]; then
            echo "tasks_found=true" >> $GITHUB_OUTPUT
            echo "Found queued model tasks"
          else
            echo "tasks_found=false" >> $GITHUB_OUTPUT
            echo "No queued model tasks found"
          fi
      
      - name: Process queued model tasks
        if: steps.check-tasks.outputs.tasks_found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_ACTIONS: true
        run: |
          node scripts/process-model-tasks.js
      
      - name: Generate automated reviews
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_ACTIONS: true
          PROJECT_ID: ${{ inputs.project_id }}
          FORCE_REVIEW: ${{ inputs.force_review }}
        run: |
          node scripts/generate-automated-reviews.js
      
      - name: Update project statuses
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/update-project-statuses.js
      
      - name: Commit review results
        run: |
          git config --local user.email "llmxive@contextlab.ai"
          git config --local user.name "llmXive Automated Review Bot"
          
          # Check if there are changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "🤖 Automated review generation $(date -u +"%Y-%m-%d %H:%M UTC")

            - Generated automated reviews for eligible projects
            - Updated project phase statuses based on review points
            - Processed queued model tasks

            Generated by llmXive v2.0 Automated Review System"
            
            git push
            echo "Committed automated review results"
          else
            echo "No changes to commit"
          fi
      
      - name: Generate summary report
        run: |
          node scripts/generate-review-summary.js > review-summary.md
          cat review-summary.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload review logs
        uses: actions/upload-artifact@v3
        with:
          name: review-logs-${{ github.run_number }}
          path: |
            .llmxive-system/logs/automated-reviews.json
            .llmxive-system/logs/model-calls.json
            .llmxive-system/logs/batch-operations.json
          retention-days: 30