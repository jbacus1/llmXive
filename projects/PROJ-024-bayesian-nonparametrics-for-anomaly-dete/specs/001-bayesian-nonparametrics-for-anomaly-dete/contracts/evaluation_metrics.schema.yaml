# Evaluation Metrics Contract Schema
# Defines the structure for evaluation metrics outputs
# Used for validation and result aggregation
$schema: http://json-schema.org/draft-07/schema#
title: EvaluationMetrics
description: "Output schema for evaluation metrics from anomaly detection experiments"
type: object
required:
  - dataset_name
  - timestamp
  - metrics
  - model_info
properties:
  dataset_name:
    type: string
    description: "Name of the dataset evaluated"
    examples:
      - "ucr_nmtf"
      - "ucb_msl"
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp when evaluation was performed"
    examples:
      - "2024-01-15T10:30:00Z"
  metrics:
    type: object
    description: "Core evaluation metrics"
    required:
      - precision
      - recall
      - f1_score
      - auc_roc
      - auc_pr
    properties:
      precision:
        type: number
        format: float
        description: "Precision score"
        minimum: 0
        maximum: 1
      recall:
        type: number
        format: float
        description: "Recall score"
        minimum: 0
        maximum: 1
      f1_score:
        type: number
        format: float
        description: "F1-score (harmonic mean of precision and recall)"
        minimum: 0
        maximum: 1
      auc_roc:
        type: number
        format: float
        description: "Area under the ROC curve"
        minimum: 0
        maximum: 1
      auc_pr:
        type: number
        format: float
        description: "Area under the Precision-Recall curve"
        minimum: 0
        maximum: 1
      accuracy:
        type: number
        format: float
        description: "Overall accuracy"
        minimum: 0
        maximum: 1
        nullable: true
  confusion_matrix:
    type: object
    description: "Confusion matrix data"
    required:
      - tp
      - tn
      - fp
      - fn
    properties:
      tp:
        type: integer
        description: "True positives"
        minimum: 0
      tn:
        type: integer
        description: "True negatives"
        minimum: 0
      fp:
        type: integer
        description: "False positives"
        minimum: 0
      fn:
        type: integer
        description: "False negatives"
        minimum: 0
  roc_curve_data:
    type: object
    description: "ROC curve points for plotting"
    required:
      - fpr
      - tpr
      - thresholds
    properties:
      fpr:
        type: array
        items:
          type: number
          format: float
        description: "False positive rates"
      tpr:
        type: array
        items:
          type: number
          format: float
        description: "True positive rates"
      thresholds:
        type: array
        items:
          type: number
          format: float
        description: "Threshold values corresponding to points"
  pr_curve_data:
    type: object
    description: "Precision-Recall curve points for plotting"
    required:
      - precision
      - recall
      - thresholds
    properties:
      precision:
        type: array
        items:
          type: number
          format: float
        description: "Precision values"
      recall:
        type: array
        items:
          type: number
          format: float
        description: "Recall values"
      thresholds:
        type: array
        items:
          type: number
          format: float
        description: "Threshold values corresponding to points"
  model_info:
    type: object
    description: "Information about the model used for evaluation"
    required:
      - model_type
      - model_version
      - hyperparameters
    properties:
      model_type:
        type: string
        description: "Type of model evaluated"
        enum:
          - DPGMM
          - ARIMA
          - MovingAverage
          - Ensemble
      model_version:
        type: string
        description: "Version of the model"
        pattern: "^\\d+\\.\\d+\\.\\d+$"
      hyperparameters:
        type: object
        description: "Hyperparameters used for this evaluation"
      runtime_seconds:
        type: number
        format: float
        description: "Total runtime for evaluation"
      peak_memory_mb:
        type: number
        format: float
        description: "Peak memory usage in MB"
  baseline_comparison:
    type: object
    description: "Comparison with baseline models"
    properties:
      baselines_evaluated:
        type: array
        items:
          type: string
        description: "List of baseline model names"
      f1_improvement:
        type: number
        format: float
        description: "F1-score improvement over best baseline"
      num_hyperparameters_reduction:
        type: integer
        description: "Reduction in hyperparameters vs baselines"
  statistical_tests:
    type: object
    description: "Results of statistical significance tests"
    properties:
      paired_ttest:
        type: object
        description: "Paired t-test results vs baselines"
        properties:
          p_value:
            type: number
            format: float
          statistic:
            type: number
            format: float
          significant:
            type: boolean
      bonferroni_corrected:
        type: boolean
        description: "Whether Bonferroni correction was applied"
      alpha_level:
        type: number
        format: float
        description: "Significance level used"
        default: 0.05
  metadata:
    type: object
    description: "Additional metadata about the evaluation"
    properties:
      num_observations:
        type: integer
        description: "Number of observations evaluated"
      num_anomalies:
        type: integer
        description: "Number of true anomalies in dataset"
      anomaly_rate:
        type: number
        format: float
        description: "Ground truth anomaly rate"
      threshold_used:
        type: number
        format: float
        description: "Threshold used for anomaly flagging"
      seed_used:
        type: integer
        description: "Random seed for reproducibility"
additionalProperties: false
examples:
  - dataset_name: "ucr_nmtf"
    timestamp: "2024-01-15T10:30:00Z"
    metrics:
      precision: 0.85
      recall: 0.78
      f1_score: 0.81
      auc_roc: 0.92
      auc_pr: 0.88
    confusion_matrix:
      tp: 156
      tn: 8234
      fp: 27
      fn: 44
    roc_curve_data:
      fpr: [0, 0.01, 0.05, 0.1, 0.5, 1.0]
      tpr: [0, 0.15, 0.45, 0.72, 0.95, 1.0]
      thresholds: [0.95, 0.9, 0.8, 0.7, 0.5, 0.1]
    pr_curve_data:
      precision: [1.0, 0.95, 0.85, 0.75, 0.6, 0.5]
      recall: [0.1, 0.25, 0.45, 0.65, 0.85, 1.0]
      thresholds: [0.95, 0.9, 0.8, 0.7, 0.5, 0.1]
    model_info:
      model_type: "DPGMM"
      model_version: "1.0.0"
      hyperparameters:
        concentration_parameter: 1.0
        num_clusters_max: 10
      runtime_seconds: 1245.5
      peak_memory_mb: 3200
    baseline_comparison:
      baselines_evaluated: ["ARIMA", "MovingAverage"]
      f1_improvement: 0.03
      num_hyperparameters_reduction: 3
    statistical_tests:
      paired_ttest:
        p_value: 0.023
        statistic: 2.34
        significant: true
      bonferroni_corrected: true
      alpha_level: 0.05
    metadata:
      num_observations: 8461
      num_anomalies: 200
      anomaly_rate: 0.0236
      threshold_used: -5.0
      seed_used: 42