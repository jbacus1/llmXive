$schema: http://json-schema.org/draft-07/schema#
title: Evaluation Metrics Schema
description: Schema for model evaluation metrics
type: object
required:
  - metrics
properties:
  metrics:
    type: array
    description: Evaluation metrics per dataset and method
    items:
      type: object
      required:
        - dataset_name
        - method
        - f1_score
        - precision
        - recall
      properties:
        dataset_name:
          type: string
          description: Dataset identifier
        method:
          type: string
          enum:
            - DPGMM
            - ARIMA
            - MOVING_AVERAGE
        precision:
          type: number
          minimum: 0
          maximum: 1
        recall:
          type: number
          minimum: 0
          maximum: 1
        f1_score:
          type: number
          minimum: 0
          maximum: 1
        auc_roc:
          type: number
          minimum: 0
          maximum: 1
        auc_pr:
          type: number
          minimum: 0
          maximum: 1
        threshold:
          type: number
        n_anomalies_detected:
          type: integer
        n_true_anomalies:
          type: integer
        runtime_seconds:
          type: number
          minimum: 0
        memory_peak_gb:
          type: number
          minimum: 0
          maximum: 7
      additionalProperties: false
  summary:
    type: object
    properties:
      total_datasets:
        type: integer
      total_comparisons:
        type: integer
      dpgmm_f1_mean:
        type: number
      dpgmm_f1_std:
        type: number
      baseline_f1_mean:
        type: number
      baseline_f1_std:
        type: number
      meets_sc001:
        type: boolean
        description: Whether F1 within 5% of baselines
    required:
      - total_datasets
      - total_comparisons
      - meets_sc001
  random_seed:
    type: integer
  created_at:
    type: string
    format: date-time
  config_hash:
    type: string
    description: SHA256 hash of config.yaml for reproducibility
