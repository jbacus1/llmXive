# Configuration Contract Schema
# Defines the structure for all configuration files used by the project
# Used for validation and ensuring reproducibility
$schema: http://json-schema.org/draft-07/schema#
title: Config
description: "Configuration schema for the Bayesian Nonparametrics Anomaly Detection system"
type: object
required:
  - random_seeds
  - hyperparameters
  - dataset_paths
  - threshold_params
  - runtime_limits
properties:
  random_seeds:
    type: object
    description: "Random seeds for reproducibility"
    required:
      - global_seed
      - model_seed
      - inference_seed
    properties:
      global_seed:
        type: integer
        description: "Global random seed for all operations"
        minimum: 0
        examples:
          - 42
      model_seed:
        type: integer
        description: "Seed for model initialization"
        minimum: 0
      inference_seed:
        type: integer
        description: "Seed for variational inference"
        minimum: 0
  hyperparameters:
    type: object
    description: "DPGMM and inference hyperparameters"
    required:
      - concentration_parameter
      - num_clusters_max
      - learning_rate
    properties:
      concentration_parameter:
        type: number
        format: float
        description: "Stick-breaking concentration parameter (alpha)"
        minimum: 0.001
        examples:
          - 1.0
      num_clusters_max:
        type: integer
        description: "Maximum number of clusters to consider"
        minimum: 1
        maximum: 100
        examples:
          - 10
      learning_rate:
        type: number
        format: float
        description: "Learning rate for streaming updates"
        minimum: 0.0
        maximum: 1.0
        examples:
          - 0.01
      elbo_tolerance:
        type: number
        format: float
        description: "Convergence tolerance for ELBO"
        minimum: 0.0
        examples:
          - 1e-4
      max_iterations:
        type: integer
        description: "Maximum iterations for inference"
        minimum: 1
        examples:
          - 1000
  dataset_paths:
    type: object
    description: "Paths to datasets used for training and evaluation"
    required:
      - raw_data_dir
      - processed_data_dir
      - output_dir
    properties:
      raw_data_dir:
        type: string
        description: "Directory containing raw dataset files"
        pattern: "^data/raw/.*$"
      processed_data_dir:
        type: string
        description: "Directory for processed dataset files"
        pattern: "^data/processed/.*$"
      output_dir:
        type: string
        description: "Directory for model outputs and results"
        pattern: "^data/output/.*$"
      datasets:
        type: array
        description: "List of dataset specifications"
        items:
          type: object
          required:
            - name
            - source_url
            - expected_checksum
          properties:
            name:
              type: string
              description: "Dataset name"
            source_url:
              type: string
              format: uri
              description: "URL to download dataset from"
            expected_checksum:
              type: string
              description: "SHA256 checksum for validation"
              pattern: "^[a-f0-9]{64}$"
  threshold_params:
    type: object
    description: "Anomaly threshold calibration parameters"
    required:
      - percentile
      - min_anomaly_rate
      - max_anomaly_rate
    properties:
      percentile:
        type: number
        format: float
        description: "Percentile for threshold computation (e.g., 95 for 95th)"
        minimum: 50
        maximum: 99.9
        examples:
          - 95
      min_anomaly_rate:
        type: number
        format: float
        description: "Minimum acceptable anomaly rate"
        minimum: 0
        maximum: 0.5
        examples:
          - 0.01
      max_anomaly_rate:
        type: number
        format: float
        description: "Maximum acceptable anomaly rate"
        minimum: 0
        maximum: 0.5
        examples:
          - 0.1
      calibration_split:
        type: number
        format: float
        description: "Fraction of data for threshold calibration"
        minimum: 0
        maximum: 1
        examples:
          - 0.2
  runtime_limits:
    type: object
    description: "Runtime constraints per plan.md"
    required:
      - max_memory_gb
      - max_runtime_minutes
    properties:
      max_memory_gb:
        type: number
        format: float
        description: "Maximum memory usage in GB"
        minimum: 1
        maximum: 32
        examples:
          - 7
      max_runtime_minutes:
        type: integer
        description: "Maximum runtime per dataset in minutes"
        minimum: 1
        maximum: 180
        examples:
          - 30
  logging:
    type: object
    description: "Logging configuration"
    properties:
      level:
        type: string
        enum:
          - DEBUG
          - INFO
          - WARNING
          - ERROR
          - CRITICAL
        default: INFO
      format:
        type: string
        description: "Log message format string"
        default: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
      file_output:
        type: boolean
        description: "Whether to write logs to file"
        default: true
      file_path:
        type: string
        description: "Path to log file"
        default: "logs/anomaly_detection.log"
additionalProperties: false
examples:
  random_seeds:
    global_seed: 42
    model_seed: 42
    inference_seed: 42
  hyperparameters:
    concentration_parameter: 1.0
    num_clusters_max: 10
    learning_rate: 0.01
    elbo_tolerance: 1e-4
    max_iterations: 1000
  dataset_paths:
    raw_data_dir: "data/raw/"
    processed_data_dir: "data/processed/"
    output_dir: "data/output/"
    datasets:
      - name: "ucr_nmtf"
        source_url: "https://data.uci.edu/dataset/nmtf"
        expected_checksum: "abc123def456..."
  threshold_params:
    percentile: 95
    min_anomaly_rate: 0.01
    max_anomaly_rate: 0.1
    calibration_split: 0.2
  runtime_limits:
    max_memory_gb: 7
    max_runtime_minutes: 30
  logging:
    level: INFO
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file_output: true
    file_path: "logs/anomaly_detection.log"
