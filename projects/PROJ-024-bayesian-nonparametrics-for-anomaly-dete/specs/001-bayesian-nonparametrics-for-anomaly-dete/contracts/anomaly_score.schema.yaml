$schema: http://json-schema.org/draft-07/schema#
title: Anomaly Score Schema
description: Schema for validating anomaly score output files
version: 1.0.0

type: object
required:
  - observation_index
  - observation_value
  - score
  - is_anomaly
  - threshold

properties:
  observation_index:
    type: integer
    description: Index in the time series
    minimum: 0

  observation_value:
    type: number
    description: The observed value
    minimum: -1e100
    maximum: 1e100

  score:
    type: number
    description: Negative log posterior probability
    minimum: -1e100
    maximum: 1e100

  is_anomaly:
    type: boolean
    description: Flagged anomaly based on threshold

  threshold:
    type: number
    description: Threshold used for flagging
    minimum: -1e100
    maximum: 1e100

  timestamp:
    type: string
    format: date-time
    description: When scoring occurred

  component_weights:
    type: array
    description: Optional mixture component weights at this point
    items:
      type: number
      minimum: 0.0
      maximum: 1.0
    minItems: 1

additionalProperties: false
