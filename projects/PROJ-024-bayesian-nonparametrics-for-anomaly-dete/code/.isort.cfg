[settings]
profile = black
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
known_first_party = models, services, utils, data, evaluation
known_third_party = numpy, pandas, pymc, sklearn, statsmodels, matplotlib, yaml, pytest, scipy
default_section = THIRDPARTY
skip =
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info
