# Ruff configuration for Bayesian Nonparametrics Anomaly Detection project
# Follows PEP 8, PEP 257, and project-specific conventions

[lint]
# Enable comprehensive rule sets
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "ANN",  # flake8-annotations
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
]

# Ignore rules that conflict with black formatting
ignore = [
    "E501",  # line-too-long (handled by black)
    "ANN002", # missing-type-args
    "ANN003", # missing-type-kwargs
    "ANN204", # missing-return-type-special-method
    "ANN101", # missing-type-self
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Exclude common non-source directories
exclude = [
    ".git",
    "__pycache__",
    ".eggs",
    "*.egg-info",
    "dist",
    "build",
    ".mypy_cache",
    ".pytest_cache",
]

# Per-file-ignores for test files (less strict)
[lint.per-file-ignores]
"tests/**/*.py" = [
    "ANN",  # type annotations less critical in tests
    "S101", # assert statements in tests are fine
]

[lint.flake8-annotations]
# Allow missing type annotations for self/cls in methods
allow-self-type-annotation = true
allow-cls-type-annotation = true

[lint.isort]
# Sort imports consistently
known-first-party = ["models", "baselines", "evaluation", "utils", "data"]
force-sort-within-sections = true

[lint.pydocstyle]
convention = "numpy"  # Match numpy-style docstrings

[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query"]

[lint.mccabe]
max-complexity = 15  # Reasonable limit for complex models

[lint.pylint]
max-args = 10
max-locals = 15
max-returns = 6
max-branches = 20
max-statements = 50
max-attributes = 15

[format]
# Black-compatible formatting
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
