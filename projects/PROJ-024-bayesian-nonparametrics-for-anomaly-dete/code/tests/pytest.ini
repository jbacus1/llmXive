[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add warnings as errors for cleaner test output
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers for different test types
markers =
    contract: Contract/schema validation tests
    integration: Integration tests between components
    unit: Unit tests for individual functions
    slow: Tests that take longer than 10 seconds
    edge_case: Tests for edge cases and error handling
