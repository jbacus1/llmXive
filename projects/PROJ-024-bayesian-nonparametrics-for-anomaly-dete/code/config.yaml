# ============================================================================
# DPGMM Anomaly Detection Configuration
# ============================================================================
# Project: Bayesian Nonparametrics for Anomaly Detection in Time Series
# Branch: 001-bayesian-nonparametrics-anomaly-detection
# ============================================================================

# -----------------------------------------------------------------------------
# HYPERPARAMETERS
# -----------------------------------------------------------------------------
dpgmm:
  # Dirichlet Process concentration parameter (alpha)
  # Controls expected number of mixture components
  # Lower values favor fewer components, higher values allow more flexibility
  concentration_alpha: 1.0

  # Gaussian-Wishart prior hyperparameters for each mixture component
  # mu_0: prior mean for component means
  # kappa_0: precision scaling factor for prior mean
  # lambda_0: prior degrees of freedom for Wishart
  # psi_0: prior scale matrix for Wishart (inverse covariance)
  gaussian_wishart:
    mu_0: 0.0
    kappa_0: 0.01
    lambda_0: 2
    psi_0: 1.0

  # ADVI variational inference parameters
  advi:
    # Number of variational iterations per streaming update
    n_iter: 100
    # Learning rate for stochastic gradient updates
    learning_rate: 0.01
    # ELBO convergence tolerance
    elbo_tol: 1e-4
    # Random seed for reproducibility
    random_seed: 42

  # Anomaly scoring parameters
  anomaly:
    # Scoring method: 'negative_log_posterior' or 'mahalanobis_distance'
    scoring_method: negative_log_posterior
    # Minimum number of observations before scoring is enabled
    warmup_period: 50

# -----------------------------------------------------------------------------
# THRESHOLD CALIBRATION (User Story 3)
# -----------------------------------------------------------------------------
# Decision boundary configuration for anomaly flagging without labeled data
# Per FR-007 and US3 acceptance scenario 2
threshold:
  # Calibration method for unlabeled data
  # Options: 'percentile', 'mad', 'adaptive'
  method: percentile

  # Percentile threshold for anomaly detection (95th percentile of score distribution)
  # Points with anomaly scores above this percentile are flagged as anomalies
  # This is the primary decision boundary for US3
  percentile_value: 95

  # MAD (Median Absolute Deviation) multiplier for alternative threshold
  # Used when percentile method is not appropriate
  mad_multiplier: 3.0

  # Minimum anomaly rate floor (0.01 = 1% minimum anomaly rate)
  min_anomaly_rate: 0.01

  # Maximum anomaly rate ceiling (0.10 = 10% maximum anomaly rate)
  max_anomaly_rate: 0.10

  # Number of observations to collect before initial threshold calibration
  calibration_window: 200

  # Whether to update threshold adaptively during streaming
  adaptive_threshold: true

  # Smoothing factor for adaptive threshold updates (0.0 = no smoothing, 1.0 = full smoothing)
  smoothing_factor: 0.1

# -----------------------------------------------------------------------------
# DATASET PATHS
# -----------------------------------------------------------------------------
paths:
  # Base project directory (relative to code/)
  base_dir: ..

  # Raw data directory
  raw_data: ../data/raw

  # Processed data directory
  processed_data: ../data/processed

  # Results output directory
  results: ../data/results

  # Log files directory
  logs: ../logs

  # State/checksums directory
  state: ../state

# -----------------------------------------------------------------------------
# DATASET CONFIGURATION
# -----------------------------------------------------------------------------
datasets:
  # UCI Electricity Load Diagrams
  electricity:
    url: https://archive.ics.uci.edu/ml/machine-learning-databases/00321/LD2011_2014.txt
    file: electricity_load.csv
    has_anomaly_labels: false
    observation_count: 35040

  # UCI Traffic Volume
  traffic:
    url: https://archive.ics.uci.edu/ml/machine-learning-databases/00331/Traffic%20Volume%20Data.zip
    file: traffic_volume.csv
    has_anomaly_labels: false
    observation_count: 17544

  # UCI Synthetic Control Chart
  synthetic_control:
    url: https://archive.ics.uci.edu/ml/machine-learning-databases/00360/synthetic_control.data
    file: synthetic_control.csv
    has_anomaly_labels: true
    observation_count: 600

# -----------------------------------------------------------------------------
# EVALUATION SETTINGS (User Story 2)
# -----------------------------------------------------------------------------
evaluation:
  # Baseline models to compare against DPGMM
  baselines:
    - moving_average_zscore
    - arima
    - lstm_autoencoder

  # Statistical test configuration
  statistical_tests:
    # Paired t-test with Bonferroni correction
    use_bonferroni: true
    # Significance level
    alpha: 0.05

  # Runtime constraints
  max_runtime_minutes: 30
  max_memory_gb: 7

# -----------------------------------------------------------------------------
# MEMORY & PERFORMANCE
# -----------------------------------------------------------------------------
performance:
  # Maximum number of mixture components to prevent unbounded growth
  max_components: 50

  # Prune components with weight below this threshold
  prune_threshold: 0.001

  # Memory profiling enabled
  profile_memory: true

  # Streaming batch size (1 for true streaming, >1 for mini-batch updates)
  batch_size: 1

# -----------------------------------------------------------------------------
# REPLICATION & REPRODUCIBILITY
# -----------------------------------------------------------------------------
replication:
  # Global random seed for all stochastic operations
  global_seed: 42

  # Enable deterministic operations where possible
  deterministic_mode: true

  # Version control for configuration
  config_version: "1.0.0"

  # Decision boundary documentation:
  # The primary decision boundary for anomaly detection is set via the
  # threshold.percentile_value parameter (95th percentile by default).
  # This creates an adaptive threshold that calibrates to the observed
  # score distribution without requiring labeled anomaly data.
  #
  # For replication:
  # 1. Set threshold.method = 'percentile'
  # 2. Adjust threshold.percentile_value to control sensitivity
  # 3. Lower percentile_value = more sensitive (more anomalies detected)
  # 4. Higher percentile_value = less sensitive (fewer anomalies detected)
  # 5. The adaptive_threshold flag enables dynamic threshold updates during
  #    streaming to handle concept drift in the score distribution
  #
  # Alternative methods available:
  # - 'mad': Uses Median Absolute Deviation (threshold_multiplier * MAD)
  # - 'adaptive': Combines percentile with exponential smoothing
