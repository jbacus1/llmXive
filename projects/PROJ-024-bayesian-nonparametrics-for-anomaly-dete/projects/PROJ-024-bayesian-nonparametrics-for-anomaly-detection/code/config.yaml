# ============================================================================
# Configuration for Bayesian Nonparametrics Anomaly Detection
# ============================================================================
# This file is the SINGLE SOURCE OF TRUTH for all hyperparameters, seeds, and
# paths. All experiments must reference this file to ensure reproducibility.
# Per Constitution Principle 6 (Single Source of Truth).
# ============================================================================

# ----------------------------------------------------------------------------
# RANDOM SEEDS (Constitution Principle 1: Reproducibility)
# ----------------------------------------------------------------------------
random_seeds:
  numpy: 42
  pymc: 12345
  tensorflow: 67890

# ----------------------------------------------------------------------------
# DPGMM HYPERPARAMETERS (Constitution Principle 6: Prior Sensitivity)
# ----------------------------------------------------------------------------
dpgmm:
  # Stick-breaking construction parameters
  concentration_alpha: 1.0        # Dirichlet process concentration
  concentration_beta: 1.0         # Beta process base measure
  
  # Variational inference (ADVI) settings
  advi:
    n_iterations: 1000
    tolerance: 1e-4
    learning_rate: 0.01
    batch_size: 100
  
  # Cluster initialization
  max_clusters: 50                # Upper bound on number of clusters
  min_clusters: 2                 # Minimum number of clusters
  
  # Numerical stability (Constitution Principle 3: Data Hygiene)
  numerical_stability:
    epsilon: 1e-8                 # Small constant to prevent log(0)
    min_variance: 1e-6            # Floor on cluster variance
    max_variance: 1e6             # Cap on cluster variance

# ----------------------------------------------------------------------------
# DECISION BOUNDARY / THRESHOLD CALIBRATION (FR-004)
# ============================================================================
# This section documents the decision boundary for anomaly flagging per
# Functional Requirement FR-004: "Flag observations when anomaly scores
# exceed adaptive threshold."
#
# The threshold is ADAPTIVE and computed from the validation split using
# statistical properties of the anomaly score distribution.
# ============================================================================
threshold_calibration:
  # FR-004: Decision boundary method
  method: "percentile"            # Options: [percentile, mad, iqr]
  
  # Percentile-based threshold (default)
  percentile:
    value: 95                     # 95th percentile of validation scores
    description: "Observations with anomaly scores above this percentile
                  are flagged as anomalies. Calibrated on validation split
                  without requiring labeled data."
  
  # Median Absolute Deviation (alternative)
  mad:
    multiplier: 3.0               # Threshold = median + multiplier * MAD
    description: "Robust to outliers. Useful when validation data contains
                  some anomalies."
  
  # Interquartile Range (alternative)
  iqr:
    multiplier: 1.5               # Threshold = Q3 + multiplier * IQR
    description: "Standard boxplot outlier detection method."
  
  # Expected anomaly rate bounds (for sanity checking)
  expected_anomaly_rate:
    min: 0.01                     # 1% minimum expected anomaly rate
    max: 0.20                     # 20% maximum expected anomaly rate
    description: "If calibrated threshold produces rate outside this range,
                  log warning and suggest manual review."
  
  # Replication metadata (Constitution Principle 1: Reproducibility)
  replication:
    calibrated_on: "validation_split"
    calibration_dataset: "data/processed/validation_set.csv"
    calibration_timestamp: null   # Populated by ThresholdCalibrator service
    calibration_seed: 42
    notes: "Decision boundary is ADAPTIVE. To replicate exact threshold,
            you must use the same validation split and seed. For production
            deployment, re-calibrate on recent unlabeled data."

# ----------------------------------------------------------------------------
# DATASET PATHS (Constitution Principle 4: Versioning)
# ----------------------------------------------------------------------------
datasets:
  # Raw data (immutable, downloaded once)
  raw:
    directory: "data/raw/"
    uci_benchmarks:
      - name: "credit_card_fraud"
        url: "https://archive.ics.uci.edu/ml/datasets/credit+card+fraud+detection"
        checksum: "sha256:placeholder_until_download"
      - name: "nasa_motor"
        url: "https://data.nasa.gov/rocket-failure-data"
        checksum: "sha256:placeholder_until_download"
      - name: "smd_server"
        url: "https://github.com/AMLab-Amsterdam/AnomalyDetection"
        checksum: "sha256:placeholder_until_download"
  
  # Processed data (intermediate artifacts)
  processed:
    directory: "data/processed/"
    synthetic: "data/processed/synthetic_anomalies.csv"
    validation_split: "data/processed/validation_set.csv"
  
  # Final results (evaluation artifacts)
  results:
    directory: "data/results/"
    anomaly_scores: "data/results/anomaly_scores.csv"
    confusion_matrices: "data/results/confusion_matrices/"
    roc_curves: "data/results/roc_curves/"
    pr_curves: "data/results/pr_curves/"

# ----------------------------------------------------------------------------
# RUNTIME CONSTRAINTS (Constitution Principle 2: Accuracy)
# ----------------------------------------------------------------------------
runtime:
  max_runtime_minutes: 30         # Per dataset (SC-003)
  max_memory_gb: 7                # RAM constraint (FR-005)
  profiling:
    enabled: true
    log_path: "state/runtime_profile.json"
    memory_log_path: "state/memory_profile.json"

# ----------------------------------------------------------------------------
# LOGGING (Constitution Principle 5: Stability)
# ----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "state/experiment.log"
  console: true

# ----------------------------------------------------------------------------
# VERIFICATION CHECKPOINTS
# ============================================================================
# FR-004: Flag observations when scores exceed adaptive threshold
#   - Decision boundary documented above in threshold_calibration section
#   - Method: 95th percentile by default (configurable)
#   - Replication: Use same validation split and seed
#
# SC-001: F1-score within 5% of baselines on 3+ UCI datasets
#   - Evaluated in Phase 4 verification tasks
#
# SC-003: Runtime < 30 minutes per dataset
#   - Enforced by runtime_profiler.py
#
# SC-004: Fewer hyperparameters than baselines (30% reduction)
#   - DPGMM: 3 main hyperparameters (alpha, beta, max_clusters)
#   - Baselines typically require 4-6+ hyperparameters
# ============================================================================