# ============================================================================
# DPGMM Anomaly Detection Configuration
# ============================================================================
# This configuration file controls all reproducible aspects of the research
# pipeline per Constitution Principle #1 (Reproducibility) and FR-007.
#
# All random seeds are set to ensure deterministic results across runs.
# Hyperparameters follow best practices from research.md.
# Dataset paths reference the data/ directory structure from T011.
# ============================================================================

# ---------------------------------------------------------------------------
# Random Seeds (Constitution Principle: Reproducibility)
# ---------------------------------------------------------------------------
random_seeds:
  # Main seed for overall reproducibility
  main: 42
  # Seed for NumPy random operations
  numpy: 42
  # Seed for PyMC random operations
  pymc: 42
  # Seed for scikit-learn operations
  sklearn: 42
  # Seed for synthetic data generation
  synthetic: 42

# ---------------------------------------------------------------------------
# Dataset Configuration
# ---------------------------------------------------------------------------
datasets:
  # Base directory for all data (relative to project root)
  base_dir: "data"

  # Raw data subdirectory
  raw_dir: "data/raw"

  # Processed data subdirectory
  processed_dir: "data/processed"

  # Available datasets (per FR-008: 3-5 UCI datasets)
  available:
    - name: "credit_card_fraud"
      url: "https://archive.ics.uci.edu/ml/machine-learning-databases/00358/creditcard.csv"
      local_path: "data/raw/credit_card_fraud.csv"
      expected_checksum: "sha256:placeholder"  # Update after download (T016)
      anomaly_ratio: 0.0017  # Known from literature
      features: 29
      target_column: "Class"

    - name: "nsw_5000"
      url: "https://raw.githubusercontent.com/davidmcg/synthetic-anomaly-detection/main/nsw_5000.csv"
      local_path: "data/raw/nsw_5000.csv"
      expected_checksum: "sha256:placeholder"  # Update after download (T016)
      anomaly_ratio: 0.05  # Approximate
      features: 2
      target_column: "label"

    - name: "yandex_anomaly"
      url: "https://raw.githubusercontent.com/yandex-research/anomaly-detection-rnn/master/data/yandex.csv"
      local_path: "data/raw/yandex_anomaly.csv"
      expected_checksum: "sha256:placeholder"  # Update after download (T016)
      anomaly_ratio: 0.03  # Approximate
      features: 1
      target_column: "anomaly"

  # Output results directory
  results_dir: "data/results"

  # Figures directory for evaluation plots
  figures_dir: "paper/figures"

# ---------------------------------------------------------------------------
# DPGMM Hyperparameters (per research.md findings)
# ---------------------------------------------------------------------------
dpgmm:
  # Stick-breaking concentration parameter (alpha)
  # Lower values = fewer clusters, higher values = more clusters
  # Default: 1.0 (standard non-informative prior)
  concentration_alpha: 1.0

  # Prior on cluster weights
  weight_prior: "dirichlet"

  # Base distribution for cluster parameters
  base_distribution:
    # Mean prior (normal)
    mean_mu: 0.0
    mean_tau: 0.01  # Precision (1/variance)

    # Variance prior (inverse-gamma)
    variance_alpha: 1.0
    variance_beta: 1.0

  # Maximum number of clusters to consider
  # DPGMM is nonparametric but we bound for computational tractability
  max_clusters: 50

  # Minimum cluster weight threshold for pruning
  min_cluster_weight: 0.001

  # ADVI variational inference settings
  advi:
    # Number of ADVI iterations
    n_iter: 10000

    # Learning rate for ADVI optimization
    learning_rate: 0.01

    # Tolerance for ELBO convergence
    convergence_tol: 1e-4

    # Early stopping patience (iterations without improvement)
    early_stopping_patience: 500

    # Mini-batch size for streaming updates
    # Set to 1 for true streaming, higher for batch approximation
    minibatch_size: 1

    # Random seed for ADVI initialization
    init_seed: 42

  # Anomaly detection threshold
  # Negative log posterior probability threshold
  anomaly_threshold: null  # Set by T064 (adaptive calibration)

# ---------------------------------------------------------------------------
# Baseline Models Configuration (per US2)
# ---------------------------------------------------------------------------
baselines:
  # ARIMA configuration
  arima:
    order: [1, 1, 1]  # (p, d, q)
    seasonal_order: null
    enforce_stationarity: true
    enforce_invertibility: true
    start_params: null
    trend: "c"

  # Moving average + Z-score configuration
  moving_average:
    window_size: 20
    z_score_threshold: 3.0  # Standard deviations from mean

# ---------------------------------------------------------------------------
# Threshold Calibration Configuration (per US3)
# ---------------------------------------------------------------------------
threshold_calibration:
  # Method for adaptive threshold
  # Options: "percentile", "mad", "adaptive"
  method: "percentile"

  # Percentile threshold (for percentile method)
  percentile: 95

  # MAD threshold multiplier (for MAD method)
  mad_multiplier: 3.0

  # Minimum anomaly rate to maintain
  min_anomaly_rate: 0.01

  # Maximum anomaly rate to maintain
  max_anomaly_rate: 0.10

  # Validation split ratio
  validation_split: 0.2

# ---------------------------------------------------------------------------
# Evaluation Configuration (per US2)
# ---------------------------------------------------------------------------
evaluation:
  # Metrics to compute
  metrics:
    - precision
    - recall
    - f1_score
    - auc_roc
    - auc_pr
    - confusion_matrix

  # Statistical tests
  statistical_tests:
    # Paired t-test across datasets
    paired_ttest: true

    # Bonferroni correction for multiple comparisons
    bonferroni_correction: true

    # Significance level
    alpha: 0.05

  # Plot settings
  plots:
    roc_curve: true
    pr_curve: true
    precision_recall_bar: true
    anomaly_score_histogram: true

    # Figure settings
    dpi: 300
    figsize: [10, 6]
    font_size: 12

# ---------------------------------------------------------------------------
# Performance Constraints (per Constitution Principle & SC-003)
# ---------------------------------------------------------------------------
performance:
  # Maximum RAM usage (bytes)
  max_memory_gb: 7

  # Maximum runtime per dataset (seconds)
  max_runtime_seconds: 1800  # 30 minutes

  # Memory profiling enabled
  memory_profiling: true

  # Runtime profiling enabled
  runtime_profiling: true

  # Number of samples for memory estimation
  memory_profile_samples: 1000

# ---------------------------------------------------------------------------
# Logging Configuration (per T020)
# ---------------------------------------------------------------------------
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Log file (relative to project root)
  file: "code/logs/dpgmm.log"

  # Console output
  console: true

  # Log ELBO convergence diagnostics
  elbo_diagnostics: true

  # Log memory usage at intervals
  memory_log_interval_seconds: 60

# ---------------------------------------------------------------------------
# Version Control & Metadata
# ---------------------------------------------------------------------------
metadata:
  # Project version (semantic versioning)
  version: "0.1.0"

  # Git commit hash (auto-populated at runtime)
  git_commit: null

  # Configuration hash (SHA256 of this file)
  config_hash: null  # Auto-computed on load

  # Experiment ID (unique identifier for each run)
  experiment_id: null  # Auto-generated at runtime

# ---------------------------------------------------------------------------
# Debug / Development Settings
# ---------------------------------------------------------------------------
debug:
  # Enable debug mode (slower but more verbose)
  enabled: false

  # Save intermediate results for inspection
  save_intermediates: false

  # Intermediate results directory
  intermediates_dir: "data/intermediates"

  # Plot all intermediate steps
  plot_intermediates: false

  # Verbose ELBO output
  verbose_elbo: false
