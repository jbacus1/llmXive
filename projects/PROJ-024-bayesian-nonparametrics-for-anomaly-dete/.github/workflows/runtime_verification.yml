# GitHub Actions workflow to verify SC-003: Runtime constraint (<30 minutes per dataset)
# This workflow runs on every push/PR to verify runtime performance requirements

name: SC-003 Runtime Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  verify-runtime:
    name: Verify Runtime Constraint (SC-003)
    runs-on: ubuntu-latest
    
    timeout-minutes: 45  # Allow buffer beyond 30-minute limit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest pytest-cov
          pip install numpy pandas pyyaml matplotlib scipy statsmodels pymc
      
      - name: Create data directory structure
        run: |
          mkdir -p data/raw data/processed state
      
      - name: Run runtime verification script
        id: runtime-verify
        run: |
          cd projects/PROJ-024-bayesian-nonparametrics-for-anomaly-detection
          python code/scripts/verify_sc003_runtime.py
        continue-on-error: false
      
      - name: Upload runtime verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sc003-verification-results
          path: |
            state/runtime_verification.log
            state/sc003_verification.json
            projects/PROJ-024-bayesian-nonparametrics-for-anomaly-detection/state/
          retention-days: 30
      
      - name: Upload runtime profile to GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-profile
          path: |
            state/runtime_verification.log
          retention-days: 30
      
      - name: Summary
        if: always()
        run: |
          echo "## Runtime Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f state/sc003_verification.json ]; then
            echo "```json" >> $GITHUB_STEP_SUMMARY
            cat state/sc003_verification.json >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
          else
            echo "No verification results found" >> $GITHUB_STEP_SUMMARY
          fi