name: CI - Build, Test, and Type Check

on:
  push:
    branches: [main, develop, 'feature/*', 'bugfix/*']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install ruff black mypy

      - name: Run Ruff linting
        run: |
          cd code
          ruff check .

      - name: Check formatting with Black
        run: |
          cd code
          black --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install mypy

      - name: Run mypy type checking
        run: |
          cd code
          mypy . --config-file=mypy.ini

  test-coverage:
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest pytest-cov

      - name: Run contract tests
        run: |
          cd code
          pytest tests/contract/ -v --tb=short

      - name: Run integration tests
        run: |
          cd code
          pytest tests/integration/ -v --tb=short

      - name: Run unit tests
        run: |
          cd code
          pytest tests/unit/ -v --tb=short

      - name: Generate coverage report
        run: |
          cd code
          pytest --cov=code --cov-report=xml --cov-report=term-missing

  runtime-check:
    runs-on: ubuntu-latest
    needs: [test-coverage]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Run quick validation script
        run: |
          cd code
          python scripts/verify_project_structure.py

  edge-case-handler:
    runs-on: ubuntu-latest
    if: failure()
    needs: [type-check, test-coverage, runtime-check]
    steps:
      - name: Log timeout warning
        run: |
          echo "WARNING: Runtime exceeded 30-minute constraint or other failure detected"
          echo "Triggering retry logic for failed jobs"
      - name: Retry failed jobs
        run: |
          echo "Retrying failed jobs with extended timeout"
          # Retry logic would be implemented here
