name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install mypy ruff black pytest

      - name: Run Ruff linter
        run: |
          ruff check code/

      - name: Run Black formatter check
        run: |
          black --check code/

      - name: Run mypy type checking
        run: |
          cd code
          mypy --config-file=mypy.ini
        continue-on-error: false

      - name: Report type check results
        if: failure()
        run: |
          echo "## Type Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "Please fix type errors before merging." >> $GITHUB_STEP_SUMMARY

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest pytest-json-report

      - name: Run contract tests
        run: |
          cd code
          pytest tests/contract/ --json-report --json-report-file=../reports/contract-report.json

      - name: Upload contract test report
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-report
          path: reports/contract-report.json

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest

      - name: Run integration tests
        timeout-minutes: 25
        run: |
          cd code
          pytest tests/integration/ --tb=short

      - name: Report integration test results
        if: failure()
        run: |
          echo "## Integration Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "Please review integration test failures." >> $GITHUB_STEP_SUMMARY

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest

      - name: Run unit tests
        timeout-minutes: 20
        run: |
          cd code
          pytest tests/unit/ --tb=short

  memory-profile:
    name: Memory Profile Test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest memory-profiler

      - name: Run memory profile test
        timeout-minutes: 15
        run: |
          cd code
          pytest tests/unit/test_memory_profile.py -v

  baseline-comparison:
    name: Baseline Comparison
    runs-on: ubuntu-latest
    needs: memory-profile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest

      - name: Run baseline comparison test
        timeout-minutes: 30
        run: |
          cd code
          pytest tests/integration/test_baseline_comparison.py -v

      - name: Report baseline comparison results
        if: failure()
        run: |
          echo "## Baseline Comparison Failed" >> $GITHUB_STEP_SUMMARY
          echo "Please review baseline comparison failures." >> $GITHUB_STEP_SUMMARY

  threshold-calculation:
    name: Threshold Calibration
    runs-on: ubuntu-latest
    needs: memory-profile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest

      - name: Run threshold calibration test
        timeout-minutes: 15
        run: |
          cd code
          pytest tests/integration/test_threshold_calibration.py -v

  edge-case-tests:
    name: Edge Case Tests
    runs-on: ubuntu-latest
    needs: threshold-calculation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest

      - name: Run edge case tests
        timeout-minutes: 15
        run: |
          cd code
          pytest tests/unit/test_edge_cases.py -v

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, contract-tests, integration-tests, unit-tests, memory-profile, baseline-comparison, threshold-calculation, edge-case-tests]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "## CI Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-and-type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Tests | ${{ needs.contract-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Memory Profile | ${{ needs.memory-profile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Baseline Comparison | ${{ needs.baseline-comparison.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Threshold Calibration | ${{ needs.threshold-calculation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge Case Tests | ${{ needs.edge-case-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true
