name: CI - Bayesian Nonparametrics Anomaly Detection

on:
  push:
    branches: [main, develop, 'feature/*', 'bugfix/*']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

env:
  PYTHON_VERSION: '3.11'
  TIMEOUT_MINUTES: 30
  MAX_RETRIES: 3

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ env.TIMEOUT_MINUTES }}
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - unit
          - integration
          - contract
          - memory

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pytest-cov

      - name: Run runtime pre-check
        working-directory: projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from utils.runtime_monitor import RuntimeMonitor, RuntimeBudget
          monitor = RuntimeMonitor(budget=RuntimeBudget(max_seconds=1800))
          monitor.start()
          print('Runtime budget initialized: 30 minutes')
          "

      - name: Run ${{ matrix.test-suite }} tests with timeout monitoring
        id: test-run
        working-directory: projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/tests
        continue-on-error: true
        timeout-minutes: 25  # Leave 5 min buffer for cleanup
        run: |
          if [ "${{ matrix.test-suite }}" = "unit" ]; then
            pytest unit/ -v --tb=short --timeout=300
          elif [ "${{ matrix.test-suite }}" = "integration" ]; then
            pytest integration/ -v --tb=short --timeout=600
          elif [ "${{ matrix.test-suite }}" = "contract" ]; then
            pytest contract/ -v --tb=short --timeout=300
          elif [ "${{ matrix.test-suite }}" = "memory" ]; then
            pytest unit/test_memory_profile.py -v --tb=short --timeout=600
          fi
          echo "test_status=${{ job.status }}" >> $GITHUB_OUTPUT

      - name: Log timeout warning if test failed
        if: steps.test-run.outcome == 'failure' || steps.test-run.outcome == 'timed_out'
        run: |
          echo "::warning::Test suite ${{ matrix.test-suite }} exceeded timeout or failed"
          echo "Runtime edge case detected: ${{ matrix.test-suite }} tests did not complete within budget"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> runtime_edge_cases.log

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.test-suite }}-${{ github.run_id }}
          path: |
            projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/tests/*.log
            projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code/runtime_edge_cases.log
          retention-days: 7

      - name: Record runtime metrics
        if: always()
        working-directory: projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code
        run: |
          python -c "
          import json
          from pathlib import Path
          from datetime import datetime
          from utils.runtime_monitor import RuntimeMonitor, RuntimeBudget
          monitor = RuntimeMonitor(budget=RuntimeBudget(max_seconds=1800))
          metrics = {
              'timestamp': datetime.utcnow().isoformat(),
              'test_suite': '${{ matrix.test-suite }}',
              'status': '${{ steps.test-run.outcome }}',
              'timeout_limit_minutes': ${{ env.TIMEOUT_MINUTES }}
          }
          log_path = Path('runtime_metrics.json')
          if log_path.exists():
              with open(log_path) as f:
                  history = json.load(f)
          else:
              history = []
          history.append(metrics)
          with open(log_path, 'w') as f:
              json.dump(history, f, indent=2)
          print('Runtime metrics recorded')
          "

  baseline-comparison:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ env.TIMEOUT_MINUTES }}
    needs: test
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download synthetic dataset
        working-directory: projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from data.synthetic_generator import generate_synthetic_timeseries, save_synthetic_dataset
          dataset = generate_synthetic_timeseries(
              n_observations=1000,
              anomaly_rate=0.05,
              seed=42
          )
          save_synthetic_dataset(dataset, Path('data/processed/synthetic_validation.csv'))
          print('Synthetic validation dataset created')
          "

      - name: Run baseline comparison with timeout guard
        id: baseline-run
        working-directory: projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code
        continue-on-error: true
        timeout-minutes: 25
        run: |
          python -c "
          import sys
          import time
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from utils.runtime_monitor import RuntimeMonitor, RuntimeBudget, monitor_runtime
          from baselines.arima import ARIMABaseline
          from baselines.moving_average import MovingAverageBaseline
          from models.dp_gmm import DPGMMModel
          from evaluation.metrics import compute_all_metrics
          import numpy as np

          start_time = time.time()
          budget = RuntimeBudget(max_seconds=1500)  # 25 minutes
          monitor = RuntimeMonitor(budget=budget)
          monitor.start()

          try:
              # Load synthetic data
              data_path = Path('data/processed/synthetic_validation.csv')
              import pandas as pd
              df = pd.read_csv(data_path)
              values = df['value'].values
              ground_truth = df['is_anomaly'].values

              # Run DPGMM
              print('Running DPGMM...')
              dp_gmm = DPGMMModel(config={'n_init_components': 3, 'concentration_prior': 1.0})
              scores = []
              for val in values:
                  score = dp_gmm.score_observation(float(val))
                  scores.append(score.score)
              dp_gmm_predictions = np.array([1 if s > 0 else 0 for s in scores])

              # Run ARIMA baseline
              print('Running ARIMA baseline...')
              arima = ARIMABaseline(config={'order': (1, 1, 0)})
              arima.fit(values[:-10])
              arima_preds = arima.predict(values[-10:])

              # Run Moving Average baseline
              print('Running Moving Average baseline...')
              ma = MovingAverageBaseline(config={'window_size': 20, 'z_threshold': 3.0})
              ma.fit(values)
              ma_preds = ma.predict(values)

              # Compute metrics
              print('Computing evaluation metrics...')
              metrics = compute_all_metrics(ground_truth, dp_gmm_predictions)
              print(f'F1 Score: {metrics.f1_score:.4f}')
              print(f'Precision: {metrics.precision:.4f}')
              print(f'Recall: {metrics.recall:.4f}')

              elapsed = time.time() - start_time
              print(f'Baseline comparison completed in {elapsed:.2f} seconds')

          except Exception as e:
              print(f'ERROR: Baseline comparison failed: {e}')
              sys.exit(1)
          finally:
              monitor.stop()
              print(f'Runtime monitoring complete')
          "

      - name: Log baseline comparison timeout warning
        if: steps.baseline-run.outcome == 'failure' || steps.baseline-run.outcome == 'timed_out'
        run: |
          echo "::warning::Baseline comparison exceeded timeout"
          echo "Runtime edge case detected: Baseline comparison did not complete within 25 minutes"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> runtime_edge_cases.log

      - name: Upload baseline comparison logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-logs-${{ github.run_id }}
          path: |
            projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code/runtime_edge_cases.log
            projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete/code/runtime_metrics.json
          retention-days: 7

  retry-on-timeout:
    runs-on: ubuntu-latest
    needs: [test, baseline-comparison]
    if: failure()
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if failure was due to timeout
        id: check-failure
        run: |
          if grep -q "timeout" $GITHUB_STEP_SUMMARY 2>/dev/null || [ "${{ needs.test.result }}" = "failure" ]; then
            echo "is_timeout=true" >> $GITHUB_OUTPUT
          else
            echo "is_timeout=false" >> $GITHUB_OUTPUT
          fi

      - name: Log retry attempt
        if: steps.check-failure.outputs.is_timeout == 'true'
        run: |
          echo "::group::Retry Logic Triggered"
          echo "Detected timeout-related failure, initiating retry logic"
          echo "Retry attempt: 1 of ${{ env.MAX_RETRIES }}"
          echo "Previous failure timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "::endgroup::"

      - name: Create retry marker file
        if: steps.check-failure.outputs.is_timeout == 'true'
        run: |
          cat > retry_marker.json << EOF
          {
            "retry_triggered": true,
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "reason": "timeout_exceeded",
            "attempt": 1,
            "max_retries": ${{ env.MAX_RETRIES }}
          }
          EOF
          echo "Retry marker created"

      - name: Upload retry artifacts
        if: steps.check-failure.outputs.is_timeout == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: retry-marker-${{ github.run_id }}
          path: |
            retry_marker.json
            runtime_edge_cases.log
          retention-days: 7

  notify-on-edge-case:
    runs-on: ubuntu-latest
    needs: [test, baseline-comparison, retry-on-timeout]
    if: failure()
    timeout-minutes: 5

    steps:
      - name: Create edge case report
        run: |
          cat > edge_case_report.md << EOF
          # Runtime Edge Case Report

          **Workflow Run**: ${{ github.run_id }}
          **Trigger**: ${{ github.event_name }}
          **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Status**: FAILED

          ## Summary
          One or more jobs exceeded the runtime budget of ${{ env.TIMEOUT_MINUTES }} minutes.

          ## Affected Jobs
          - test: ${{ needs.test.result }}
          - baseline-comparison: ${{ needs.baseline-comparison.result }}
          - retry-on-timeout: ${{ needs.retry-on-timeout.result }}

          ## Recommended Actions
          1. Review runtime edge case logs in artifacts
          2. Check for infinite loops or inefficient algorithms
          3. Consider increasing timeout budget if legitimate long-running operation
          4. Verify dataset sizes are within expected bounds

          ## Next Steps
          - [ ] Review logs and identify bottleneck
          - [ ] Optimize slow operations
          - [ ] Update timeout budget if needed
          - [ ] Re-run workflow after fixes

          EOF
          echo "Edge case report generated"

      - name: Upload edge case report
        uses: actions/upload-artifact@v4
        with:
          name: edge-case-report-${{ github.run_id }}
          path: edge_case_report.md
          retention-days: 14

      - name: Log final warning
        run: |
          echo "::warning::Workflow exceeded runtime budget and retry logic was exhausted"
          echo "Manual review required - see edge case report in artifacts"

# Workflow-level timeout as final safeguard
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
