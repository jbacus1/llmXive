[pytest]
# Pytest configuration for Bayesian Nonparametrics Anomaly Detection project
# Per spec.md: Tests are REQUIRED per Independent Test scenarios

# Test file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Markers for test categorization
markers =
    contract: Contract tests for schema validation
    integration: Integration tests for end-to-end pipelines
    unit: Unit tests for individual components
    us1: User Story 1 - Core DPGMM Implementation
    us2: User Story 2 - Baseline Comparison
    us3: User Story 3 - Threshold Calibration
    slow: Tests that take longer than 30 seconds
    memory: Tests that profile memory usage
    streaming: Tests that validate streaming functionality

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Addopts for CI/CD
addopts =
    -v
    --tb=short
    --strict-markers
    --capture=no

# Timeout for individual tests (per SC-003: 30 min total runtime)
timeout = 1800

# Memory limit for memory profiling tests (per SC-002: 7GB)
# Note: Actual enforcement happens in test_memory_profile.py
