[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add code directory to path
addopts = -v --tb=short --strict-markers --color=yes

# Markers
markers =
    contract: Contract tests validating API schemas
    integration: Integration tests for end-to-end workflows
    unit: Unit tests for individual components
    slow: Tests that take longer than 10 seconds
    memory: Tests that profile memory usage
    baseline: Tests comparing against baseline models

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage (optional, if coverage plugin is installed)
# addopts += --cov=code --cov-report=term-missing --cov-report=html

# Timeout for tests (optional, if timeout plugin is installed)
# timeout = 300

# Parallel execution (optional, if xdist plugin is installed)
# addopts += -n auto
