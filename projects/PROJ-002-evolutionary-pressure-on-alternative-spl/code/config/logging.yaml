# Logging configuration for pipeline operations
# This file is loaded by config.py and merged with main config

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

  # Log output directory (relative to project root)
  log_dir: state/logs

  # Log file name
  file: pipeline.log

  # Maximum size of each log file before rotation (bytes)
  max_bytes: 10485760  # 10MB

  # Number of backup files to keep
  backup_count: 5

  # Enable console output
  console_enabled: true

  # Component-specific log levels (optional override)
  component_levels:
    acquisition: INFO
    alignment: INFO
    quantification: INFO
    analysis: INFO
    validation: INFO
