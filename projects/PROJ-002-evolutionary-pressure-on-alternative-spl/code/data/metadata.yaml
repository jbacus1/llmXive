# Sample Metadata Schema for Primate RNA-seq Data
# User Story 1: Data Acquisition and Preprocessing Pipeline
# Defines the structure for RNA-seq sample metadata across all species

version: "1.0"
schema_name: "primate_rnaseq_metadata"
description: >
  Metadata schema for matched RNA-seq data from cortex tissue
  across human, chimpanzee, macaque, and marmoset species

# Required fields for all samples
required_fields:
  - sample_id
  - species
  - tissue_type
  - sra_accession
  - sequencing_platform
  - read_type
  - read_length
  - library_preparation
  - sample_status

# Field definitions
fields:
  # Core identification
  sample_id:
    type: string
    pattern: "^[A-Z]{2,4}_\\d{4,}$"
    description: Unique sample identifier (e.g., HUMAN_0001, CHIMP_0002)
    required: true

  species:
    type: string
    enum:
      - human
      - chimpanzee
      - macaque
      - marmoset
    description: Primate species of origin
    required: true

  tissue_type:
    type: string
    enum:
      - cortex
      - prefrontal_cortex
      - temporal_cortex
      - frontal_cortex
    description: Brain tissue region (cortex variants)
    required: true

  # SRA data source
  sra_accession:
    type: string
    pattern: "^(SRR|ERR|DRR)\\d+$"
    description: SRA/ENA/DDBJ accession number for raw reads
    required: true

  bioproject:
    type: string
    pattern: "^PRJN[A-Z]\\d+$"
    description: NCBI BioProject identifier
    required: false

  biosample:
    type: string
    pattern: "^SAMN\\d+$"
    description: NCBI BioSample identifier
    required: false

  # Sequencing metadata
  sequencing_platform:
    type: string
    enum:
      - illumina_hiseq
      - illumina_novaseq
      - illumina_nextseq
      - illumina_miseq
    description: Sequencing platform used
    required: true

  read_type:
    type: string
    enum:
      - single_end
      - paired_end
    description: Read configuration
    required: true

  read_length:
    type: integer
    minimum: 50
    maximum: 300
    description: Read length in base pairs
    required: true

  library_preparation:
    type: string
    description: Library preparation kit/protocol used
    required: true

  # Sample characteristics
  sex:
    type: string
    enum:
      - male
      - female
      - unknown
    description: Biological sex of the sample donor
    required: false

  age:
    type: string
    description: Age of sample donor (years or life stage)
    required: false

  postmortem_interval:
    type: float
    minimum: 0
    description: Postmortem interval in hours
    required: false

  rna_integrity_number:
    type: float
    minimum: 0
    maximum: 10
    description: RNA Quality Score (RIN)
    required: false

  # Alignment tracking
  reference_genome:
    type: string
    description: Reference genome assembly used for alignment
    required: false

  reference_version:
    type: string
    description: Reference genome version (e.g., GRCh38, panTro6)
    required: false

  alignment_software:
    type: string
    description: Alignment tool used (e.g., STAR)
    required: false

  alignment_version:
    type: string
    description: Alignment software version
    required: false

  # Quality metrics (populated after alignment)
  total_reads:
    type: integer
    minimum: 0
    description: Total raw reads downloaded
    required: false

  mapped_reads:
    type: integer
    minimum: 0
    description: Successfully mapped reads
    required: false

  mapping_rate:
    type: float
    minimum: 0
    maximum: 100
    description: Mapping rate percentage
    required: false

  quality_threshold:
    type: float
    minimum: 0
    maximum: 100
    default: 70
    description: Minimum acceptable mapping rate (per SC-001)
    required: false

  # Processing status
  sample_status:
    type: string
    enum:
      - pending
      - downloaded
      - aligned
      - qc_passed
      - qc_failed
      - excluded
    description: Current processing status
    required: true

  download_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of download
    required: false

  alignment_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of alignment
    required: false

  qc_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of QC check
    required: false

  # File paths
  raw_fastq_path:
    type: string
    description: Path to raw FASTQ file(s)
    required: false

  aligned_bam_path:
    type: string
    description: Path to aligned BAM file
    required: false

  qc_report_path:
    type: string
    description: Path to quality control report
    required: false

# Validation rules
validation_rules:
  - name: mapping_rate_check
    description: Verify mapping rate meets minimum threshold
    condition: "mapping_rate >= quality_threshold"
    action: "mark_sample_as_qc_failed"

  - name: species_reference_match
    description: Ensure reference genome matches species
    condition: "reference_genome is valid for species"
    action: "raise_error"

  - name: paired_end_read_consistency
    description: For paired-end, both R1 and R2 must exist
    condition: "read_type == paired_end implies both R1 and R2 files exist"
    action: "mark_sample_as_excluded"

# Example sample entries
examples:
  - sample_id: "HUMAN_0001"
    species: "human"
    tissue_type: "cortex"
    sra_accession: "SRR12345678"
    sequencing_platform: "illumina_novaseq"
    read_type: "paired_end"
    read_length: 150
    library_preparation: "truseq_stranded_rna"
    sample_status: "pending"
    quality_threshold: 70

  - sample_id: "CHIMP_0001"
    species: "chimpanzee"
    tissue_type: "prefrontal_cortex"
    sra_accession: "SRR87654321"
    sequencing_platform: "illumina_hiseq"
    read_type: "paired_end"
    read_length: 100
    library_preparation: "truseq_stranded_rna"
    sample_status: "pending"
    quality_threshold: 70

  - sample_id: "MACAQUE_0001"
    species: "macaque"
    tissue_type: "temporal_cortex"
    sra_accession: "SRR11223344"
    sequencing_platform: "illumina_nextseq"
    read_type: "paired_end"
    read_length: 75
    library_preparation: "truseq_stranded_rna"
    sample_status: "pending"
    quality_threshold: 70

  - sample_id: "MARMOSET_0001"
    species: "marmoset"
    tissue_type: "frontal_cortex"
    sra_accession: "SRR55667788"
    sequencing_platform: "illumina_novaseq"
    read_type: "paired_end"
    read_length: 150
    library_preparation: "truseq_stranded_rna"
    sample_status: "pending"
    quality_threshold: 70