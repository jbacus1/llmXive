$schema: http://json-schema.org/draft-07/schema#
title: Differential Splicing Event
description: Schema for a statistically significant splicing difference between lineages.
type: object
required:
  - event_id
  - gene_id
  - lineage_comparison
  - delta_psi
  - p_value
  - fdr
  - significant
properties:
  event_id:
    type: string
    description: Unique identifier for the event.
    pattern: "^EVT-[0-9]{6}$"
  gene_id:
    type: string
    description: Ensembl or RefSeq gene identifier.
  lineage_comparison:
    type: string
    description: Comparison between lineages (e.g., Human/Chimp vs Macaque/Marmoset).
    enum:
      - "Human/Chimp vs Macaque/Marmoset"
      - "Human vs Chimp"
      - "Macaque vs Marmoset"
  delta_psi:
    type: number
    description: Difference in Percent Spliced In values.
    minimum: -1.0
    maximum: 1.0
  p_value:
    type: number
    description: Raw p-value from statistical test.
    minimum: 0.0
    maximum: 1.0
  fdr:
    type: number
    description: Benjamini-Hochberg FDR corrected p-value.
    minimum: 0.0
    maximum: 1.0
  significant:
    type: boolean
    description: True if FDR < 0.05.
  junction_id:
    type: string
    description: FK to Splice Junction entity.
  coordinates:
    type: object
    properties:
      chromosome:
        type: string
      start:
        type: integer
      end:
        type: integer
      strand:
        type: string
        enum: ["+", "-"]
    required:
      - chromosome
      - start
      - end
      - strand
additionalProperties: false
