$schema: http://json-schema.org/draft-07/schema#
title: Figure Data Contract
description: Defines the contract for figure ↔ data binding per Constitution Principle II.
type: object
required:
  - figure_id
  - source_file
  - generation_script
  - checksum
properties:
  figure_id:
    type: string
    description: "Unique identifier (e.g., 'Figure 1')"
    pattern: "^Figure \\d+$"
  source_file:
    type: string
    description: "Path to data file in data/ directory"
    pattern: "^data/.*\\.(csv|json|tsv)$"
  generation_script:
    type: string
    description: "Path to Python script generating the figure"
    pattern: "^scripts/figures/.*\\.py$"
  checksum:
    type: string
    description: "SHA-256 checksum of the source file"
    pattern: "^[a-f0-9]{64}$"
  version:
    type: string
    description: "Version of the generation script"
    default: "1.0.0"
examples:
  - figure_id: "Figure 1"
    source_file: "data/pipeline_workflow.json"
    generation_script: "scripts/figures/pipeline.py"
    checksum: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    version: "1.0.0"
