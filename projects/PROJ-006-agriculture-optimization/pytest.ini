[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test execution settings
addopts = -v --tb=short --strict-markers -ra
asyncio_mode = auto

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Markers (custom markers must be declared here)
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use external services)
    contract: Contract/schema validation tests
    slow: Slow-running tests (>30 seconds)
    api: Tests that make API calls
    us1: User Story 1 - Data Collection & Ingestion
    us2: User Story 2 - Climate Risk Assessment
    us3: User Story 3 - CSA Recommendation Engine
    us4: User Story 4 - GIS Visualization & Reporting

# Coverage settings (optional, for coverage reports)
# Used with pytest-cov plugin
# addopts = --cov=src --cov-report=term-missing --cov-report=html

# Timeouts for tests
# Used with pytest-timeout plugin
timeout = 300

# Doctest configuration
doctest_optionflags = ELLIPSIS NORMALIZE_WHITESPACE
