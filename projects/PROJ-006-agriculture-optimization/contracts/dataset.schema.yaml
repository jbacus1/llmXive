$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://speckit.ai/climate-smart-agriculture/dataset.schema.yaml"
title: "Climate-Smart Agricultural Dataset Schema"
description: "Validation schema for all datasets in the CSA system"
version: "1.0.0"

definitions:
  location:
    type: object
    required:
      - location_id
      - latitude
      - longitude
    properties:
      location_id:
        type: string
        pattern: "^[A-Z]{2}-[0-9]{6}$"
        description: "ISO-style location identifier"
      latitude:
        type: number
        minimum: -90
        maximum: 90
      longitude:
        type: number
        minimum: -180
        maximum: 180
      elevation_m:
        type: number
        minimum: -400
      country_code:
        type: string
        pattern: "^[A-Z]{2}$"
      region:
        type: string

  metadata:
    type: object
    required:
      - source
      - created_at
      - version
    properties:
      source:
        type: string
        enum:
          - openweathermap
          - usgs_earthexplorer
          - survey
          - fao_stat
          - world_bank
          - custom
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      version:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      record_count:
        type: integer
        minimum: 0
      checksum:
        type: string
        pattern: "^[a-f0-9]{64}$"
      license:
        type: string
      contact:
        type: string
        format: email

  climate_record:
    type: object
    required:
      - id
      - location_id
      - timestamp
    properties:
      id:
        type: string
        pattern: "^CLM-[0-9]{10}$"
      location_id:
        type: string
        pattern: "^[A-Z]{2}-[0-9]{6}$"
      timestamp:
        type: string
        format: date-time
      temperature_avg:
        type: number
        minimum: -50
        maximum: 60
      temperature_max:
        type: number
        minimum: -50
        maximum: 60
      temperature_min:
        type: number
        minimum: -50
        maximum: 60
      precipitation:
        type: number
        minimum: 0
      humidity:
        type: number
        minimum: 0
        maximum: 100
      wind_speed:
        type: number
        minimum: 0
      data_quality:
        type: string
        enum:
          - verified
          - estimated
          - missing

  agricultural_record:
    type: object
    required:
      - id
      - farm_id
      - location_id
      - crop_type
      - area_hectares
    properties:
      id:
        type: string
        pattern: "^AGR-[0-9]{10}$"
      farm_id:
        type: string
        pattern: "^FARM-[0-9]{8}$"
      location_id:
        type: string
        pattern: "^[A-Z]{2}-[0-9]{6}$"
      crop_type:
        type: string
        enum:
          - maize
          - wheat
          - rice
          - sorghum
          - millet
          - cassava
          - beans
          - other
      planting_date:
        type: string
        format: date
      harvest_date:
        type: string
        format: date
      yield_kg_per_ha:
        type: number
        minimum: 0
      area_hectares:
        type: number
        minimum: 0.01
      irrigation_method:
        type: string
        enum:
          - rainfed
          - surface
          - drip
          - sprinkler
          - other
      fertilizer_used:
        type: boolean
      practices:
        type: array
        items:
          type: string
          enum:
            - conservation_tillage
            - crop_rotation
            - cover_crops
            - agroforestry
            - integrated_pest_management
            - water_harvesting

  socioeconomic_record:
    type: object
    required:
      - id
      - community_id
      - data_year
    properties:
      id:
        type: string
        pattern: "^SOC-[0-9]{10}$"
      community_id:
        type: string
        pattern: "^COMM-[0-9]{8}$"
      population:
        type: integer
        minimum: 0
      poverty_rate:
        type: number
        minimum: 0
        maximum: 100
      education_level:
        type: string
        enum:
          - primary
          - secondary
          - tertiary
      income_per_capita:
        type: number
        minimum: 0
      food_security_index:
        type: number
        minimum: 0
        maximum: 100
      data_year:
        type: integer
        minimum: 2000
        maximum: 2030

  remote_sensing_record:
    type: object
    required:
      - id
      - location_id
      - acquisition_date
      - sensor_type
      - data_path
    properties:
      id:
        type: string
        pattern: "^RS-[0-9]{10}$"
      location_id:
        type: string
        pattern: "^[A-Z]{2}-[0-9]{6}$"
      acquisition_date:
        type: string
        format: date
      sensor_type:
        type: string
        enum:
          - landsat_8
          - landsat_9
          - sentinel_2
          - modis
          - other
      cloud_coverage:
        type: number
        minimum: 0
        maximum: 100
      ndvi_mean:
        type: number
        minimum: -1
        maximum: 1
      ndvi_std:
        type: number
        minimum: 0
        maximum: 1
      evi_mean:
        type: number
        minimum: -1
        maximum: 2
      elevation_m:
        type: number
      data_path:
        type: string
        pattern: "^data/raw/.*\\.(tiff|tif|nc)$"

  risk_assessment_record:
    type: object
    required:
      - id
      - location_id
      - assessment_date
      - drought_risk
      - flood_risk
      - heat_stress_risk
      - overall_risk
      - risk_category
    properties:
      id:
        type: string
        pattern: "^RISK-[0-9]{10}$"
      location_id:
        type: string
        pattern: "^[A-Z]{2}-[0-9]{6}$"
      assessment_date:
        type: string
        format: date-time
      drought_risk:
        type: number
        minimum: 0
        maximum: 1
      flood_risk:
        type: number
        minimum: 0
        maximum: 1
      heat_stress_risk:
        type: number
        minimum: 0
        maximum: 1
      overall_risk:
        type: number
        minimum: 0
        maximum: 1
      risk_category:
        type: string
        enum:
          - low
          - moderate
          - high
          - critical
      contributing_factors:
        type: array
        items:
          type: string
      confidence_level:
        type: number
        minimum: 0
        maximum: 1

  recommendation_record:
    type: object
    required:
      - id
      - community_id
      - generated_date
      - practice_name
      - practice_category
      - priority
      - justification
    properties:
      id:
        type: string
        pattern: "^REC-[0-9]{10}$"
      community_id:
        type: string
        pattern: "^COMM-[0-9]{8}$"
      generated_date:
        type: string
        format: date-time
      practice_name:
        type: string
        minLength: 1
      practice_category:
        type: string
        enum:
          - soil
          - water
          - crop
          - integrated
      priority:
        type: string
        enum:
          - high
          - medium
          - low
      expected_yield_impact:
        type: number
        minimum: -100
        maximum: 500
      adoption_feasibility:
        type: number
        minimum: 0
        maximum: 1
      cost_estimate_usd:
        type: number
        minimum: 0
      justification:
        type: string
        minLength: 10
      references:
        type: array
        items:
          type: string

# Main dataset schema
type: object
required:
  - id
  - name
  - source
  - category
  - created_at
  - version
  - records
properties:
  id:
    type: string
    pattern: "^DS-[0-9]{10}$"
    description: "Unique dataset identifier"
  name:
    type: string
    minLength: 1
    maxLength: 200
    description: "Human-readable dataset name"
  source:
    type: string
    enum:
      - openweathermap
      - usgs_earthexplorer
      - survey
      - fao_stat
      - world_bank
      - custom
    description: "Origin of the data"
  category:
    type: string
    enum:
      - climate
      - agricultural
      - socioeconomic
      - remote_sensing
      - risk_assessment
      - recommendation
    description: "Data category classification"
  created_at:
    type: string
    format: date-time
    description: "Timestamp of dataset creation"
  updated_at:
    type: string
    format: date-time
    description: "Last modification timestamp"
  version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: "Semantic version of dataset schema"
  record_count:
    type: integer
    minimum: 0
    description: "Number of records in dataset"
  checksum:
    type: string
    pattern: "^[a-f0-9]{64}$"
    description: "SHA-256 hash for integrity verification"
  location:
    $ref: "#/definitions/location"
  metadata:
    $ref: "#/definitions/metadata"
  records:
    type: array
    minItems: 0
    description: "Array of data records"
    items:
      oneOf:
        - $ref: "#/definitions/climate_record"
        - $ref: "#/definitions/agricultural_record"
        - $ref: "#/definitions/socioeconomic_record"
        - $ref: "#/definitions/remote_sensing_record"
        - $ref: "#/definitions/risk_assessment_record"
        - $ref: "#/definitions/recommendation_record"
  validation:
    type: object
    properties:
      validated_at:
        type: string
        format: date-time
      validator_version:
        type: string
      is_valid:
        type: boolean
      errors:
        type: array
        items:
          type: object
          properties:
            field:
              type: string
            message:
              type: string
            severity:
              type: string
              enum:
                - warning
                - error
                - critical

additionalProperties: false