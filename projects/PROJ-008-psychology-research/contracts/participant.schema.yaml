$schema: http://json-schema.org/draft-07/schema#
$id: https://speckit.org/contracts/participant.schema.yaml

title: Participant Schema
description: >
  Defines the structure for participant demographics and consent data
  for the Mindfulness and Social Skills in Children with ASD research study.
  All PII fields must be encrypted per HIPAA requirements.

type: object
required:
  - participant_id
  - demographics
  - consent

properties:
  participant_id:
    type: string
    pattern: "^P[0-9]{3}$"
    description: >
      Unique anonymized participant identifier (e.g., P001, P002).
      Generated by data collector, never manually entered.
    example: "P001"
  
  enrollment_date:
    type: string
    format: date
    description: Date of participant enrollment (YYYY-MM-DD)
    example: "2025-01-15"
  
  demographics:
    type: object
    required:
      - age_at_enrollment
      - sex_at_birth
      - gender_identity
      - asd_diagnosis_date
      - asd_diagnosis_provider
    description: Core demographic information for stratified analysis
    properties:
      age_at_enrollment:
        type: integer
        minimum: 6
        maximum: 17
        description: Age in years at time of enrollment
        example: 10
      
      sex_at_birth:
        type: string
        enum: ["male", "female", "intersex", "unknown"]
        description: Biological sex assigned at birth
        example: "male"
      
      gender_identity:
        type: string
        enum: ["male", "female", "non-binary", "genderqueer", "prefer_not_to_say", "other"]
        description: Self-reported gender identity
        example: "male"
      
      race_ethnicity:
        type: array
        items:
          type: string
          enum:
            - "white"
            - "black_or_african_american"
            - "asian"
            - "native_hawaiian_or_pacific_islander"
            - "american_indian_or_alaska_native"
            - "hispanic_or_latino"
            - "not_hispanic_or_latino"
            - "prefer_not_to_say"
            - "other"
        description: Self-reported race and ethnicity (multiple selections allowed)
        example: ["white", "not_hispanic_or_latino"]
      
      asd_diagnosis_date:
        type: string
        format: date
        description: Date of ASD diagnosis (YYYY-MM-DD)
        example: "2020-03-22"
      
      asd_diagnosis_provider:
        type: string
        minLength: 2
        description: Provider type who diagnosed ASD (e.g., developmental pediatrician, psychologist)
        example: "developmental_pediatrician"
      
      asd_severity_level:
        type: string
        enum: ["level_1", "level_2", "level_3", "unknown"]
        description: DSM-5 ASD severity level (requires support level)
        example: "level_1"
      
      comorbidities:
        type: array
        items:
          type: string
          enum:
            - "adhd"
            - "anxiety_disorder"
            - "depression"
            - "epilepsy"
            - "intellectual_disability"
            - "speech_language_delay"
            - "sensory_processing_disorder"
            - "none"
            - "other"
        description: Documented comorbid conditions (multiple allowed)
        example: ["adhd", "anxiety_disorder"]
      
      primary_language:
        type: string
        description: Primary language spoken at home
        example: "english"
      
      parent_education_level:
        type: string
        enum:
          - "high_school_or_less"
          - "some_college"
          - "bachelors_degree"
          - "graduate_degree"
          - "prefer_not_to_say"
        description: Highest education level of primary caregiver
        example: "bachelors_degree"
      
      household_income_bracket:
        type: string
        enum:
          - "under_30k"
          - "30k_to_60k"
          - "60k_to_100k"
          - "over_100k"
          - "prefer_not_to_say"
        description: Annual household income bracket for socioeconomic stratification
        example: "60k_to_100k"
  
  consent:
    type: object
    required:
      - parent_consent_status
      - child_assent_status
      - irb_approval_number
      - consent_form_version
      - consent_date
    description: IRB-mandated consent and assent documentation
    properties:
      parent_consent_status:
        type: string
        enum: ["obtained", "declined", "withdrawn", "pending"]
        description: Status of parent/guardian informed consent
        example: "obtained"
      
      parent_consent_method:
        type: string
        enum: ["in_person", "electronic", "mail"]
        description: Method by which parent consent was obtained
        example: "electronic"
      
      child_assent_status:
        type: string
        enum: ["obtained", "not_applicable", "declined", "withdrawn"]
        description: Child assent status (not required for ages 6-7 per IRB waiver)
        example: "obtained"
      
      assent_form_version:
        type: string
        pattern: "^v[0-9]+\\.[0-9]+$"
        description: Version of child assent form used
        example: "v1.2"
      
      consent_form_version:
        type: string
        pattern: "^v[0-9]+\\.[0-9]+$"
        description: Version of parent consent form used
        example: "v2.0"
      
      irb_approval_number:
        type: string
        pattern: "^IRB-[0-9]{4}-[0-9]{4}$"
        description: Institutional Review Board approval number
        example: "IRB-2025-0001"
      
      consent_date:
        type: string
        format: date
        description: Date parent consent was signed (YYYY-MM-DD)
        example: "2025-01-10"
      
      assent_date:
        type: string
        format: date
        description: Date child assent was obtained (YYYY-MM-DD)
        example: "2025-01-10"
      
      withdrawal_consent:
        type: object
        description: Tracks any partial or full data withdrawal requests
        properties:
          has_withdrawn:
            type: boolean
            default: false
          withdrawal_date:
            type: string
            format: date
          withdrawal_scope:
            type: string
            enum: ["none", "partial_data", "full_data", "future_contact_only"]
      
      emergency_contact:
        type: object
        description: Emergency contact information (encrypted storage)
        properties:
          name:
            type: string
          relationship:
            type: string
          phone:
            type: string
            description: Phone number stored encrypted
        required:
          - name
          - relationship
          - phone
  
  audit_trail:
    type: object
    description: System-generated audit information
    properties:
      created_by:
        type: string
        description: User ID who created this record
      created_at:
        type: string
        format: date-time
      modified_by:
        type: string
        description: User ID who last modified this record
      modified_at:
        type: string
        format: date-time
      data_hash:
        type: string
        description: SHA-256 hash for data integrity verification
  
  timepoints:
    type: object
    description: Tracks enrollment status across study timepoints
    properties:
      baseline_enrolled:
        type: boolean
        default: true
      baseline_date:
        type: string
        format: date
      post_intervention_enrolled:
        type: boolean
      post_intervention_date:
        type: string
        format: date
      follow_up_enrolled:
        type: boolean
      follow_up_date:
        type: string
        format: date
      dropout_reason:
        type: string
        enum:
          - "none"
          - "family_relocation"
          - "medical_reason"
          - "loss_of_interest"
          - "intervention_adverse_event"
          - "other"
    
additionalProperties: false

# Metadata for schema validation
x-speckit:
  schema_version: "1.0.0"
  created_date: "2025-01-15"
  related_contracts:
    - "assessment.schema.yaml"
    - "intervention.schema.yaml"
  irb_requirements:
    - "HIPAA_compliance"
    - "parent_consent_required"
    - "child_assent_age_8_plus"
  test_coverage:
    - "tests/contract/test_participant_schema.py"