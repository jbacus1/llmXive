$schema: http://json-schema.org/draft-07/schema#
title: Reaction Metric Schema
description: Schema for validating derived lifetime and product distribution metrics
type: object
properties:
  metric_id:
    type: string
    pattern: "^metric_[a-z]+_[0-9]+$"
    description: "Unique identifier for reaction metric"
  solvent_id:
    type: string
    pattern: "^[a-z]+_[0-9]+$"
    description: "Foreign key to Solvent Condition"
  lifetime_ns:
    type: number
    minimum: 0.0
    description: "Singlet-radical-pair lifetime in nanoseconds"
  lifetime_ci_lower_ns:
    type: number
    minimum: 0.0
    description: "95% confidence interval lower bound"
  lifetime_ci_upper_ns:
    type: number
    minimum: 0.0
    description: "95% confidence interval upper bound"
  fit_r_squared:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Exponential fit quality (R²)"
  replicate_count:
    type: integer
    minimum: 3
    description: "Number of replicates (n ≥ 3)"
  mean_lifetime_ns:
    type: number
    minimum: 0.0
    description: "Mean lifetime across replicates"
  std_lifetime_ns:
    type: number
    minimum: 0.0
    description: "Standard deviation across replicates"
  product_distribution:
    type: object
    properties:
      ortho_percent:
        type: number
        minimum: 0.0
        maximum: 100.0
      para_percent:
        type: number
        minimum: 0.0
        maximum: 100.0
    required:
      - ortho_percent
      - para_percent
    description: "HPLC-derived product ratios (ortho/para)"
  analysis_timestamp:
    type: string
    format: date-time
    description: "ISO-8601 timestamp of analysis"
required:
  - metric_id
  - solvent_id
  - lifetime_ns
  - lifetime_ci_lower_ns
  - lifetime_ci_upper_ns
  - fit_r_squared
  - replicate_count
  - mean_lifetime_ns
  - std_lifetime_ns
  - analysis_timestamp
additionalProperties: false
